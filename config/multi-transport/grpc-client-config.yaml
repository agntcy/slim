# Native gRPC client for config/multi-transport/server-config.yaml.
tracing:
  log_level: info
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      clients:
        - endpoint: "http://localhost:46358"
          tls:
            insecure: true
      servers: []
