# golangci-lint v2 configuration (see https://golangci-lint.run/docs/product/migration-guide/)
version: "2"

run:
  # concurrency when linting
  concurrency: 4

  # 10 min seems enough to run the linter
  timeout: 10m

  # exit code
  issues-exit-code: 1

  # also format test files
  tests: true

  # this guarantees that go.mod does not need updates
  modules-download-mode: readonly

  # parallel golangci-lint instances running.
  allow-parallel-runners: true

# output configuration (v2: map-based formats; text + colors replaces v1 colored-line-number)
output:
  formats:
    text:
      path: stdout
      colors: true
      print-linter-name: true
      print-issued-lines: true

linters:
  enable:
    - copyloopvar
    - depguard
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - lll
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  # settings of specific linters (v2: was linters-settings)
  settings:
    depguard:
      rules:
        denied-deps:
          deny:
            - pkg: go.uber.org/atomic
              desc: "Use 'sync/atomic' instead of go.uber.org/atomic"
            - pkg: github.com/pkg/errors
              desc: "Use 'errors' or 'fmt' instead of github.com/pkg/errors"
            - pkg: github.com/hashicorp/go-multierror
              desc: "Use go.uber.org/multierr instead of github.com/hashicorp/go-multierror"

    govet:
      # shadow variable checks (v1: shadow: true)
      enable:
        - shadow
      enable-all: true
      disable:
        - fieldalignment
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf

    lll:
      # max line length, lines longer will be reported. Default is 120.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option
      line-length: 120
      # tab width in spaces. Default to 1.
      tab-width: 1

    misspell:
      # US locale
      locale: US

    revive:
      # minimal confidence for issues, default is 0.8
      min-confidence: 0.8

  # v1 issues.exclude-dirs (third-party) and skip-dirs-use-default: false migration:
  # explicit paths plus default preset dirs golangci would otherwise skip.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third-party
      - third_party$
      - builtin$
      - examples$

# v2: gofmt and goimports are formatters, not linters
formatters:
  enable:
    - gci
    - gofmt
    - goimports

  settings:
    gci:
      # defines import block order
      sections:
        - standard
        - default
        - prefix(github.com/agntcy/slim)
      custom-order: true

    gofmt:
      # simplify code: gofmt with `-s` option, true by default
      simplify: true

    goimports:
      # put imports beginning with this prefix after 3rd-party packages (v2: list form)
      local-prefixes:
        - github.com/agntcy/slim

  exclusions:
    generated: lax
    paths:
      - third-party
      - third_party$
      - builtin$
      - examples$
