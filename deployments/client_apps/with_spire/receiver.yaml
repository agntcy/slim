apiVersion: v1
kind: ConfigMap
metadata:
  name: slim-with-spire-client-config
  labels:
    app.kubernetes.io/name: slim-client
data:
  client.json: |
    {
      "endpoint": "https://slim.slim.svc.cluster.local:46357",
      "tls": {
        "source": {
          "type": "spire",
          "socket_path": "unix:/tmp/spire-agent/public/api.sock"
        },
        "ca_source": {
          "type": "spire",
          "socket_path": "unix:/tmp/spire-agent/public/api.sock",
          "trust_domains": ["cluster-a.example"]
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alice
  labels:
    app.kubernetes.io/name: slim-client
    app.kubernetes.io/component: alice
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: alice
  labels:
    app.kubernetes.io/name: slim-client
    app.kubernetes.io/component: alice
spec:
  className: spire-spire
  podSelector:
    matchExpressions:
    - key: app.kubernetes.io/component
      operator: In
      values:
      - alice
  workloadSelectorTemplates:
    - k8s:sa:alice
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/default/sa/alice"
  federatesWith:
    - cluster-b.example
---
apiVersion: v1
kind: Pod
metadata:
  name: alice
  labels:
    app.kubernetes.io/name: slim-client
    app.kubernetes.io/component: alice
spec:
  containers:
  - args:
    - slim-bindings-p2p
    - --spire-socket-path
    - unix:/tmp/spire-agent/public/api.sock
    - --spire-jwt-audience
    - slim-demo
    - --local
    - org/ns/alice
    - --slim-config
    - /etc/slim/client.json
    env:
    - name: PYTHONUNBUFFERED
      value: "1"
    image: agntcy/slim/bindings-examples:latest
    imagePullPolicy: IfNotPresent
    name: client
    volumeMounts:
    - name: spire-agent-socket
      mountPath: /tmp/spire-agent/public/
      readOnly: true
    - name: slim-client-config
      mountPath: /etc/slim
      readOnly: true      
  restartPolicy: OnFailure
  serviceAccountName: alice
  volumes:
  - hostPath:
      path: /run/spire/agent-sockets
      type: Directory
    name: spire-agent-socket
  - name: slim-client-config
    configMap:
      name: slim-with-spire-client-config
      defaultMode: 0444    
