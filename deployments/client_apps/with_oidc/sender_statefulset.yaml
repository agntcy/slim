#
# OIDC-authenticated sender (bob).
# Credentials must be populated after ZITADEL setup:
#   kubectl create secret generic bob-oidc-credentials \
#     --from-literal=client_id=<ID> --from-literal=client_secret=<SECRET>

apiVersion: v1
kind: Secret
metadata:
  name: bob-oidc-credentials
type: Opaque
stringData:
  client_id: "<set-after-zitadel-setup>"
  client_secret: "<set-after-zitadel-setup>"
---
apiVersion: v1
kind: Pod
metadata:
  name: bob
  labels:
    app.kubernetes.io/name: slim-client
    app.kubernetes.io/component: bob
spec:
  containers:
  - args:
    - p2p
    - --message
    - hello
    - --iterations
    - "10"
    - --local
    - org/ns/bob
    - --remote
    - org/ns/alice
    - --slim
    - "http://slim.slim.svc.cluster.local:46359"
    - --oidc-issuer-url
    - "http://zitadel.zitadel.svc.cluster.local:8080"
    - --oidc-client-id
    - "$(OIDC_CLIENT_ID)"
    - --oidc-client-secret
    - "$(OIDC_CLIENT_SECRET)"
    - --oidc-audience
    - "slim-api"
    env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: bob-oidc-credentials
          key: client_id
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: bob-oidc-credentials
          key: client_secret
    image: bindings-examples:1.2.0-dev.1
    imagePullPolicy: Never
    name: client
  restartPolicy: OnFailure
