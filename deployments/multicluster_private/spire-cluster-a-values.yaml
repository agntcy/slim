#
# Root SPIRE on cluster-a (Kind). Requires ingress-nginx + cert-manager + selfsigned-issuer.
# Add to /etc/hosts (cluster-a LB IP): spire.cluster-a.example spire-bundle.cluster-a.example
#
# Trust domain matches default CLUSTER_A_TRUST_DOMAIN for DNS; join token SPIFFE ID:
#   spiffe://cluster-a.example/bootstrap/upstream-agent/cluster-b
# Downstream server static entry parentID must match that bootstrap ID.

global:
  spire:
    clusterName: "cluster-a"
    trustDomain: "cluster-a.example"
    ingressControllerType: other
    tools:
      kubectl:
        tag: "v1.28.0"

  installAndUpgradeHooks:
    enabled: false

  deleteHooks:
    enabled: false

spire-server:
  ingress:
    enabled: true
    className: "nginx"
    controllerType: "other"
    host: spire.cluster-a.example
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-issuer
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "GRPCS"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    tls:
      - hosts:
          - spire.cluster-a.example
    hosts:
      - host: spire.cluster-a.example
        paths:
          - path: /
            pathType: Prefix

  federation:
    enabled: true
    tls:
      spire:
        enabled: false
      certManager:
        enabled: true
        issuer:
          create: false
        certificate:
          issuerRef:
            kind: ClusterIssuer
            name: selfsigned-issuer
    ingress:
      enabled: true
      className: "nginx"
      controllerType: "other"
      host: spire-bundle.cluster-a.example
      annotations:
        cert-manager.io/cluster-issuer: selfsigned-issuer
        nginx.ingress.kubernetes.io/ssl-passthrough: "true"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
        nginx.ingress.kubernetes.io/proxy-ssl-name: "spire-bundle.cluster-a.example"
        nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      tls:
        - hosts:
            - spire-bundle.cluster-a.example
          secretName: spire-root-federation-tls
      hosts:
        - host: spire-bundle.cluster-a.example
          paths:
            - path: /
              pathType: Prefix

  controllerManager:
    watchClassless: true
    className: "slim-mc-spire"
    identities:
      clusterSPIFFEIDs:
        oidc-discovery-provider:
          enabled: false
        test-keys:
          enabled: false
      clusterStaticEntries:
        cluster-b-child-server:
          spiffeID: spiffe://cluster-a.example/downstream-spire-server/cluster-b
          parentID: spiffe://cluster-a.example/bootstrap/upstream-agent/cluster-b
          selectors:
            - k8s:ns:spire-system
            - k8s:sa:spire-server-downstream
          downstream: true

  externalControllerManagers:
    enabled: false

  nodeAttestor:
    externalK8sPSAT:
      enabled: false

  bundlePublisher:
    externalK8sConfigMap:
      enabled: false

spiffe-oidc-discovery-provider:
  enabled: false
