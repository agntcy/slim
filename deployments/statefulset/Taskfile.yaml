version: "3"

# This Taskfile includes specific tasks for the naive deployment strategy.

includes:
  templates: 
    taskfile: ../Taskfile.yaml
    internal: true

  apps: 
    taskfile: ../client_apps/Taskfile.yaml
    dir: ../client_apps
    internal: true

silent: true

vars:
  STRATEGY: "statefulset"
  ZITADEL_NAMESPACE: '{{ .ZITADEL_NAMESPACE | default "zitadel" }}'

tasks:
  default:
    cmds:
      - task: templates:default
  
  cluster:up:
    desc: Start a local Kubernetes cluster using Kind
    cmds:
      - task: templates:cluster:up
  
  cluster:down:
    desc: Delete the local Kubernetes cluster
    cmds:
      - task: templates:cluster:down

  spire:deploy:
    desc: Deploy Spire server and agent
    cmds:
      - task: templates:spire:deploy


  slim:controller:deploy:
    desc: Deploy Slim Controller
    cmds:
      - |
        helm upgrade --install slim-control ../../charts/slim-control-plane \
          --namespace {{ .SLIM_NAMESPACE }} \
          --create-namespace \
          --set image.tag="{{ .SLIM_CONTROLLER_IMAGE_TAG }}" \
          --values controller-values.yaml  
          
  slim:deploy:
    desc: Deploy Slim using the StatefulSet deployment strategy
    requires:
      vars: [SLIM_IMAGE_TAG]
    cmds:
      - | 
        helm upgrade --install slim ../../charts/slim \
          --namespace {{ .SLIM_NAMESPACE }} \
          --create-namespace \
          --set slim.image.tag="{{ .SLIM_IMAGE_TAG }}" \
          --values statefulset-values.yaml

  zitadel:postgresql:deploy:
    desc: Deploy PostgreSQL for ZITADEL (ephemeral, no persistence)
    cmds:
      - |
        helm upgrade --install \
        zitadel-postgresql \
        oci://registry-1.docker.io/bitnamicharts/postgresql \
        --namespace {{ .ZITADEL_NAMESPACE }} \
        --create-namespace \
        --set image.registry=docker.io \
        --set image.repository=bitnamilegacy/postgresql \
        --set image.tag=17.6.0 \
        --set auth.database=zitadel \
        --set auth.username=zitadel \
        --set auth.password=zitadel \
        --set auth.postgresPassword=zitadel \
        --set primary.persistence.enabled=false \
        --wait \
        --timeout 5m

  zitadel:postgresql:delete:
    desc: Remove PostgreSQL deployment for ZITADEL
    cmds:
      - helm delete zitadel-postgresql -n {{ .ZITADEL_NAMESPACE }}

  zitadel:deploy:
    desc: Deploy ZITADEL OIDC identity provider (requires zitadel:postgresql:deploy first)
    deps:
      - zitadel:postgresql:deploy
    cmds:
      - |
        helm upgrade --install \
        zitadel \
        ./zitadel \
        -f zitadel-values.yaml \
        --namespace {{ .ZITADEL_NAMESPACE }} \
        --create-namespace \
        --wait \
        --timeout 15m

  zitadel:delete:
    desc: Remove ZITADEL and PostgreSQL deployments
    cmds:
      - helm delete zitadel -n {{ .ZITADEL_NAMESPACE }} || true
      - helm delete zitadel-postgresql -n {{ .ZITADEL_NAMESPACE }} || true

  zitadel:port-forward:
    desc: Port-forward ZITADEL API and Login UI to localhost
    cmds:
      - kubectl port-forward svc/zitadel -n {{ .ZITADEL_NAMESPACE }} 8080:8080     

  multi-cluster:lb:up:
    desc: Start cloud provider for LoadBalancer support
    status:
    # Only start the processes if they are not running
      - ps aux | grep '[c]loud-provider-kind' >/dev/null;

    cmds:
      - |
        echo "Starting Kind cloud provider for LoadBalancer support..."
        bash -c "go run sigs.k8s.io/cloud-provider-kind@latest >/dev/null 2>&1 &"

  multi-cluster:lb:down:
    desc: Stop cloud provider for LoadBalancer support
    status:
    # Only kill the processes if they are running
      - test -z $(ps aux | grep '[c]loud-provider-kind') >/dev/null;

    cmds:
      - |
        echo "Stopping Kind cloud provider for LoadBalancer support..."
        kill -9 $(ps aux | grep [c]loud-provider-kind | awk '{print $2}')             

  test.sender:deploy:
    desc: Deploy sender application
    cmds:
      - task: apps:k8s:apply
        vars:
          TEMPLATE: '{{ .TEMPLATE | default "./with_spire/sender_statefulset.yaml" }}'  
          NAMESPACE: '{{ .NAMESPACE | default "default" }}'

  test.receiver:deploy:
    desc: Deploy receiver application
    cmds:
      - task: apps:k8s:apply
        vars:
          TEMPLATE: '{{ .TEMPLATE | default "./with_spire/receiver_statefulset.yaml" }}'  
          NAMESPACE: '{{ .NAMESPACE | default "default" }}'




