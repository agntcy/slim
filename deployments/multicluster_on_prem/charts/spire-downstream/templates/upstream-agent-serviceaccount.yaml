{{- if and .Values.spire.upstream.enabled (not .Values.spire.upstream.bundledAgentEnabled) }}
{{- $ua := index .Values.spire "upstream-spire-agent" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $ua.serviceAccount.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: agent-upstream
---
# Same kubelet/node read rules as spire-agent subchart roles.yaml (upstream agent needs k8s PSAT / join bootstrap).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-%s-upstream-agent" .Release.Namespace .Release.Name | quote }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s-upstream-agent" .Release.Namespace .Release.Name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ $ua.serviceAccount.name | quote }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-%s-upstream-agent" .Release.Namespace .Release.Name | quote }}
{{- end }}
