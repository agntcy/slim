# Optional overrides for charts/spire-downstream (merged after chart defaults).
# Cluster-b nodes must resolve spire.cluster-a.example and spire-bundle.cluster-a.example
# (e.g. same LB IP in /etc/hosts on the host + extraMounts, or DNS).

spire:
  global:
    spire:
      trustDomain: "cluster-a.example"
      upstreamSpireAddress: "spire.cluster-a.example"

  upstream-spire-agent:
    trustBundleURL: "https://spire-bundle.cluster-a.example"
