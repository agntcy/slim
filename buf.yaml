version: v2
lint:
  disallow_comment_ignores: true
  use:
    - MINIMAL
  except:
    - PACKAGE_DIRECTORY_MATCH
deps:
  - buf.build/googleapis/googleapis
modules:
  - path: crates/proto/proto
    name: buf.build/agntcy/slim
breaking:
  use:
    - FILE
  ignore_only:
    FIELD_NO_DELETE:
      - data-plane/v1/data_plane.proto
    FIELD_SAME_NAME:
      - data-plane/v1/data_plane.proto
    FIELD_SAME_TYPE:
      - data-plane/v1/data_plane.proto
    FIELD_SAME_CARDINALITY:
      - data-plane/v1/data_plane.proto
    FIELD_SAME_JSON_NAME:
      - data-plane/v1/data_plane.proto
