# Relay-only node (server) used for subscription ACK compatibility tests.
# No controller endpoint: tests that only need pub/sub routing do not require slimctl.

tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-sub-ack-relay"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      servers:
        - endpoint: "0.0.0.0:46490"
          tls:
            insecure: true
      clients: []
