# sdk-mock / slim client connecting to the *second* dataplane node in a two-node
# federation (listen port placeholder 46481, rewritten by tests).

tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-test-app-node-b"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      clients:
        - endpoint: "http://localhost:46481"
          tls:
            insecure: true
