#
# Node B for header-integrity + control-plane integration: federates to node A
# (client to http://localhost:46480) and exposes a controller for slimctl.
# Ports 46481/46482 are rewritten at test runtime.

tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-header-mac-node-b"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      servers:
        - endpoint: "0.0.0.0:46481"
          tls:
            insecure: true
      clients:
        - endpoint: "http://localhost:46480"
          tls:
            insecure: true
    controller:
      servers:
        - endpoint: "0.0.0.0:46482"
          tls:
            insecure: true
