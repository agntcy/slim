---
version: "3"

includes:
  root:
    taskfile: ../Taskfile.yaml
    internal: true

silent: true

tasks:
  default:
    cmds:
      - task -l

  tests:build-binaries:
    desc: "Build SLIM binaries required by integration tests"
    dir: ".."
    cmds:
      - cargo build --bin slim -p agntcy-slim
      - cargo build --bin sdk-mock -p slim-examples
      - cargo build --bin client -p slim-examples
      - cargo build --bin channel-manager -p agntcy-slim-channel-manager
      - cargo build --bin slimctl -p agntcy-slimctl
      - cargo build --bin slim-control-plane -p agntcy-slim-control-plane

  tests:integration:
    desc: "Run active Rust integration tests"
    dir: "."
    deps:
      - tests:build-binaries
    cmds:
      - cargo test -p slim-integration-tests -- --nocapture
