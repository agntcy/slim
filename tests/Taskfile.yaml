---
version: "3"

includes:
  control-plane:
    taskfile: ../control-plane/Taskfile.yaml
    flatten: true
    dir: ../control-plane
    internal: true
  data-plane:
    taskfile: ../data-plane/Taskfile.yaml
    flatten: true
    dir: ../data-plane
    internal: true

silent: true

tasks:
  default:
    cmds:
      - task -l

  tests:build-legacy-binaries:
    desc: "Build all legacy binaries (slim, receiver, sender, sdk-mock) for backward-compat testing"
    dir: ".."
    vars:
      LEGACY_BRANCH: "slim-v1.1.0-test-apps"
    status:
      - test -f .dist/bin/slim-legacy
      - test -f .dist/bin/receiver-legacy
      - test -f .dist/bin/sender-legacy
      - test -f .dist/bin/sdk-mock-legacy
    cmds:
      - |
        # Fetch the legacy branch if it doesn't exist locally
        if ! git rev-parse --verify {{.LEGACY_BRANCH}} >/dev/null 2>&1; then
          echo "Fetching legacy branch {{.LEGACY_BRANCH}}..."
          git fetch origin {{.LEGACY_BRANCH}}:{{.LEGACY_BRANCH}} || \
          git fetch origin refs/heads/{{.LEGACY_BRANCH}}:refs/heads/{{.LEGACY_BRANCH}}
        fi
        
        WORKTREE=$(mktemp -d)
        trap 'git worktree remove --force "$WORKTREE"' EXIT
        git worktree add "$WORKTREE" {{.LEGACY_BRANCH}}
        
        # Build slim, sdk-mock, and the test apps
        cargo build --manifest-path "$WORKTREE/data-plane/Cargo.toml" \
          --config "$WORKTREE/data-plane/.cargo/config.toml" \
          --bins \
          -p agntcy-slim \
          -p slim-examples \
          -p agntcy-slim-bindings \
          --examples
        
        mkdir -p .dist/bin
        cp "$WORKTREE/data-plane/target/debug/slim" .dist/bin/slim-legacy
        cp "$WORKTREE/data-plane/target/debug/sdk-mock" .dist/bin/sdk-mock-legacy
        cp "$WORKTREE/data-plane/target/debug/examples/receiver" .dist/bin/receiver-legacy
        cp "$WORKTREE/data-plane/target/debug/examples/sender" .dist/bin/sender-legacy

  tests:build-current-test-apps:
    desc: "Build receiver and sender test apps from current branch"
    dir: ".."
    cmds:
      - cargo build --manifest-path data-plane/Cargo.toml --config data-plane/.cargo/config.toml -p agntcy-slim-bindings --examples

  tests:integration:
    desc: "Run integration tests"
    vars:
      USE_LOCAL_BINDINGS: '{{.USE_LOCAL_BINDINGS | default "false"}}'
      FORCE_LOCAL_BINDINGS: '{{.FORCE_LOCAL_BINDINGS | default "false"}}'
    deps:
      - data-plane:build
      - data-plane:slimctl:build
      - tests:build-legacy-binaries
      - tests:build-current-test-apps
      - task: control-plane:build
        vars:
          USE_LOCAL_BINDINGS: "{{.USE_LOCAL_BINDINGS}}"
          FORCE_LOCAL_BINDINGS: "{{.FORCE_LOCAL_BINDINGS}}"
    cmds:
      - go -C ./integration test -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 5m -timeout 5m -ginkgo.v .
