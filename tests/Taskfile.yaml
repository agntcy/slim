---
version: "3"

includes:
  root:
    taskfile: ../Taskfile.yaml
    flatten: true
    dir: ..
    internal: true

silent: true

tasks:
  default:
    cmds:
      - task -l

  tests:build-legacy-binaries:
    desc: "Build all legacy binaries (slim, receiver, sender) for backward-compat testing"
    dir: ".."
    vars:
      LEGACY_BRANCH: "v2-main"
    status:
      - test -f .dist/bin/slim-legacy
      - test -f .dist/bin/receiver-legacy
      - test -f .dist/bin/sender-legacy
      # Verify the binaries are from the correct branch by checking a marker file
      - test -f .dist/bin/.legacy-branch && grep -q "^v2-main$" .dist/bin/.legacy-branch
    cmds:
      - |
        # Fetch the legacy branch if it doesn't exist locally
        if ! git rev-parse --verify {{.LEGACY_BRANCH}} >/dev/null 2>&1; then
          echo "Fetching legacy branch {{.LEGACY_BRANCH}}..."
          git fetch origin {{.LEGACY_BRANCH}}:{{.LEGACY_BRANCH}} || \
          git fetch origin refs/heads/{{.LEGACY_BRANCH}}:refs/heads/{{.LEGACY_BRANCH}}
        fi

        WORKTREE=$(mktemp -d)
        trap 'git worktree remove --force "$WORKTREE"' EXIT
        git worktree add "$WORKTREE" {{.LEGACY_BRANCH}}

        # Build slim and the test apps
        cargo build --manifest-path "$WORKTREE/data-plane/Cargo.toml" \
          --config "$WORKTREE/data-plane/.cargo/config.toml" \
          --bins \
          -p agntcy-slim \
          -p slim-examples \
          --examples

        mkdir -p .dist/bin
        cp "$WORKTREE/data-plane/target/debug/slim" .dist/bin/slim-legacy
        cp "$WORKTREE/data-plane/target/debug/examples/receiver" .dist/bin/receiver-legacy
        cp "$WORKTREE/data-plane/target/debug/examples/sender" .dist/bin/sender-legacy

        # Create marker file with branch name
        echo "{{.LEGACY_BRANCH}}" > .dist/bin/.legacy-branch

  tests:integration:
    desc: "Run integration tests"
    deps:
      - root:build
    cmds:
      - go -C ./integration test -v -failfast -test.paniconexit0 -ginkgo.timeout 5m -timeout 5m .
