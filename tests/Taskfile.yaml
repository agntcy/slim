---
version: "3"

includes:
  control-plane:
    taskfile: ../control-plane/Taskfile.yaml
    flatten: true
    dir: ../control-plane
    internal: true
  data-plane:
    taskfile: ../data-plane/Taskfile.yaml
    flatten: true
    dir: ../data-plane
    internal: true

silent: true

tasks:
  default:
    cmds:
      - task -l

  tests:build-legacy-slim:
    desc: "Build the slim binary from the latest slim-v release tag for backward-compat testing"
    dir: ".."
    vars:
      LEGACY_TAG:
        sh: git tag --sort=-version:refname | grep -E "^slim-v[0-9]+\.[0-9]+\.[0-9]+$" | head -1
    status:
      - .dist/bin/slim-legacy --version | grep -qF "$(git rev-parse --short {{.LEGACY_TAG}}^{})"
    cmds:
      - |
        WORKTREE=$(mktemp -d)
        trap 'git worktree remove --force "$WORKTREE"' EXIT
        git worktree add "$WORKTREE" {{.LEGACY_TAG}}
        cargo build --manifest-path "$WORKTREE/data-plane/Cargo.toml" \
          --config data-plane/.cargo/config.toml \
          -p agntcy-slim --target-dir data-plane/target
        mkdir -p .dist/bin
        cp data-plane/target/debug/slim .dist/bin/slim-legacy

  tests:build-legacy-test-apps:
    desc: "Build receiver and sender test apps from v1.1.0-test-apps branch for backward-compat testing"
    dir: ".."
    vars:
      LEGACY_BRANCH: "v1.1.0-test-apps"
    status:
      - test -f .dist/bin/receiver-legacy
      - test -f .dist/bin/sender-legacy
    cmds:
      - |
        WORKTREE=$(mktemp -d)
        trap 'git worktree remove --force "$WORKTREE"' EXIT
        git worktree add "$WORKTREE" {{.LEGACY_BRANCH}}
        cargo build --manifest-path "$WORKTREE/data-plane/Cargo.toml" \
          --config data-plane/.cargo/config.toml \
          -p agntcy-slim-bindings \
          --examples
        mkdir -p .dist/bin
        cp data-plane/target/debug/examples/receiver .dist/bin/receiver-legacy
        cp data-plane/target/debug/examples/sender .dist/bin/sender-legacy

  tests:build-current-test-apps:
    desc: "Build receiver and sender test apps from current branch"
    dir: ".."
    cmds:
      - cargo build --manifest-path data-plane/Cargo.toml --config data-plane/.cargo/config.toml -p agntcy-slim-bindings --examples

  tests:integration:
    desc: "Run integration tests"
    vars:
      USE_LOCAL_BINDINGS: '{{.USE_LOCAL_BINDINGS | default "false"}}'
      FORCE_LOCAL_BINDINGS: '{{.FORCE_LOCAL_BINDINGS | default "false"}}'
    deps:
      - data-plane:build
      - data-plane:slimctl:build
      - tests:build-legacy-slim
      - tests:build-legacy-test-apps
      - tests:build-current-test-apps
      - task: control-plane:build
        vars:
          USE_LOCAL_BINDINGS: "{{.USE_LOCAL_BINDINGS}}"
          FORCE_LOCAL_BINDINGS: "{{.FORCE_LOCAL_BINDINGS}}"
    cmds:
      - go -C ./integration test -v -failfast -test.v -test.paniconexit0 -ginkgo.timeout 5m -timeout 5m -ginkgo.v .
