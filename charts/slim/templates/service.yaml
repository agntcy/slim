apiVersion: v1
kind: Service
metadata:
  name: {{ include "slim.fullname" . }}
  labels:
    {{- include "slim.labels" . | nindent 4 }}
spec:
  type: {{ .Values.slim.service.type }}
  {{- if eq .Values.slim.service.headless true }}
  clusterIP: None
  {{- end }}
  ports:
    {{- range $i, $data := .Values.slim.service.data }}
    - port: {{ $data.port }}
      targetPort: data-plane-{{ $i }}
      protocol: TCP
      name: data-plane-{{ $i }}
    {{- end }}
    {{- range $i, $ctrl := .Values.slim.service.control }}
    - port: {{ $ctrl.port }}
      targetPort: controller-{{ $i }}
      protocol: TCP
      name: controller-{{ $i }}
    {{- end }}
  selector:
    {{- include "slim.selectorLabels" . | nindent 4 }}
{{- if eq .Values.slim.daemonset true }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "slim.fullname" . }}-local
  labels:
    {{- include "slim.labels" . | nindent 4 }}
    local: "true"
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  ports:
    {{- range $i, $data := .Values.slim.service.data }}
    - port: {{ $data.port }}
      targetPort: data-plane-{{ $i }}
      protocol: TCP
      name: data-plane-{{ $i }}
    {{- end }}
    {{- range $i, $ctrl := .Values.slim.service.control }}
    - port: {{ $ctrl.port }}
      targetPort: controller-{{ $i }}
      protocol: TCP
      name: controller-{{ $i }}
    {{- end }}
  selector:
    {{- include "slim.selectorLabels" . | nindent 4 }}
{{- end }}
