apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "slim.fullname" . }}
  labels:
    {{- include "slim.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.slim.overrideConfig }}
    {{- tpl (toYaml .Values.slim.overrideConfig) . | nindent 4 }}
    {{- else }}
    {{- $config := deepCopy .Values.slim.config }}
    {{- if gt (int .Values.slim.replicaCount) 1 }}
    {{- $labelSelector := printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s" (include "slim.name" .) .Release.Name }}
    {{- $peers := dict "deployment_name" .Values.slim.peers.deploymentName "topology" .Values.slim.peers.topology "discovery" (dict "type" "kubernetes" "namespace" .Release.Namespace "label_selector" $labelSelector "port" (int (index .Values.slim.service.data 0).port)) }}
    {{- $_ := set (index $config "services" "slim/0") "peers" $peers }}
    {{- end }}
    {{- tpl (toYaml $config) . | nindent 4 }}
    {{- end }}
