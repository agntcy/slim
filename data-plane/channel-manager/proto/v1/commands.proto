syntax = "proto3";
package channel_manager.proto.v1;

message CreateChannelRequest {
  string channel_name = 1;
  bool mls_enabled = 2;
}

message DeleteChannelRequest {
  string channel_name = 1;
}

message AddParticipantRequest {
  string channel_name = 1;
  string participant_name = 2;
}

message DeleteParticipantRequest {
  string channel_name = 1;
  string participant_name = 2;
}

message ListChannelsRequest {}

message ListParticipantsRequest {
  string channel_name = 1;
}

message CommandResponse {
  bool success = 2;
  optional string error_msg = 3;
}

message ListChannelsResponse {
  bool success = 1;
  optional string error_msg = 2;
  repeated string channel_name = 3;
}

message ListParticipantsResponse {
  bool success = 1;
  optional string error_msg = 2;
  repeated string participant_name = 3;
}

service ChannelManagerService {
  rpc CreateChannel(CreateChannelRequest) returns (CommandResponse) {}
  rpc DeleteChannel(DeleteChannelRequest) returns (CommandResponse) {}
  rpc AddParticipant(AddParticipantRequest) returns (CommandResponse) {}
  rpc DeleteParticipant(DeleteParticipantRequest) returns (CommandResponse) {}
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse) {}
  rpc ListParticipants(ListParticipantsRequest) returns (ListParticipantsResponse) {}
}
