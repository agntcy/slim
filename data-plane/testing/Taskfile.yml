version: "3"

silent: true
set: [pipefail]
shopt: [globstar]

env:
  CONFIG_CLIENT: ../config/base/client-config.yaml
  CONFIG_SERVER: ../config/base/server-config.yaml

includes:
  testing:
    taskfile: ../../tasks/rust.yaml
    vars:
      GLOBAL_ARGS: "--workspace"

tasks:
  default:
    cmds:
      - task -l

  run:slim:
    desc: "Run the SLIM server"
    dir: ".."
    cmds:
      - task: testing:run
        vars:
          BIN: "slim"
          ARGS: "--package agntcy-slim"
          BIN_ARGS: "--config $CONFIG_SERVER"

  channel-example:moderator:mls:
    desc: "start moderator for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/moderator/1 --is-moderator --participants org/ns/t1 org/ns/t2"

  channel-example:participant-1:mls:
    desc: "start participant-1 for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/t1/1 --moderator-name org/ns/moderator/1"

  channel-example:participant-2:mls:
    desc: "start participant-2 for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/t2/1 --moderator-name org/ns/moderator/1"

  channel-example:moderator:no-mls:
    desc: "start moderator for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/moderator/1 --is-moderator --participants org/ns/t1 org/ns/t2 --mls-disabled"

  channel-example:participant-1:no-mls:
    desc: "start participant-1 for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/t1/1 --moderator-name org/ns/moderator/1 --mls-disabled"

  channel-example:participant-2:no-mls:
    desc: "start participant-2 for test channel"
    cmds:
      - task: testing:run
        vars:
          BIN: "channel"
          ARGS: ""
          BIN_ARGS: "--config $CONFIG_CLIENT --name org/ns/t2/1 --moderator-name org/ns/moderator/1 --mls-disabled"

  test:group-session:
    desc: "start MLS dynamic group test"
    cmds:
      - task: testing:run
        vars:
          BIN: "test-group"
          ARGS: ""
          BIN_ARGS: ""
      - task: testing:run
        vars:
          BIN: "test-group"
          ARGS: ""
          BIN_ARGS: "--mls-disabled"

  test:point-to-point-session:
    desc: "start test for point to point session"
    cmds:
      - task: testing:run
        vars:
          BIN: "test-p2p"
          ARGS: ""
          BIN_ARGS: "--disable-mls"
      - task: testing:run
        vars:
          BIN: "test-p2p"
          ARGS: ""
          BIN_ARGS: ""
      - task: testing:run
        vars:
          BIN: "test-p2p"
          ARGS: ""
          BIN_ARGS: "--multiple-remotes"
      - task: testing:run
        vars:
          BIN: "test-p2p"
          ARGS: ""
          BIN_ARGS: "--disable-mls --multiple-remotes"
  
  benchmark:workload-gen:
    desc: "Generate workload for load test. P = publications count; writes workload_<P>.dat (default P=2000000). Example: task benchmark:workload-gen P=10000"
    dir: ".."
    vars:
      P: '{{.P | default "2000000"}}'
    cmds:
      - task: testing:run
        vars:
          BIN: "workload-gen"
          ARGS: ""
          BIN_ARGS: "--subscriptions 1 --publications {{.P}} --instances 1 --apps 1 --output workload_{{.P}}.dat"

  benchmark:subscribe:
    desc: "Start subscriber; use same P as workload-gen (default 2000000). Optional WORKLOAD=path overrides file"
    dir: ".."
    vars:
      P: '{{.P | default "2000000"}}'
      WORKLOAD: '{{.WORKLOAD | default (printf "workload_%s.dat" .P)}}'
    cmds:
      - task: testing:run
        vars:
          BIN: "subscriber"
          ARGS: ""
          BIN_ARGS: "--config ../config/base/client-config.yaml --id 0 --workload {{.WORKLOAD}}"

  benchmark:publish:
    desc: "Start publisher (after SLIM and subscriber); same P or WORKLOAD as workload-gen"
    dir: ".."
    vars:
      P: '{{.P | default "2000000"}}'
      WORKLOAD: '{{.WORKLOAD | default (printf "workload_%s.dat" .P)}}'
    cmds:
      - task: testing:run
        vars:
          BIN: "publisher"
          ARGS: ""
          BIN_ARGS: "--config ../config/base/client-config.yaml --id 1 --workload {{.WORKLOAD}} --msg-size 1024 --frequency 0"
