version: "3"

includes:
  rust:
    taskfile: ../../../tasks/rust.yaml
    internal: true

vars:
  PROFILE: '{{.PROFILE | default "debug"}}'
  BINDINGS_PACKAGE: agntcy-slim-bindings
  CURRENT_TARGET:
    sh: 'rustc -vV | sed -n "s|host: ||p"'
  TARGET: "{{.TARGET | default .CURRENT_TARGET}}"
  SHARED_SECRET: "a-very-long-shared-secret-abcdef1234567890"

tasks:
  default:
    cmds:
      - task -l

  bindings:build:all:
    desc: Build the Rust library with cross-compilation support
    dir: "{{.TASKFILE_DIR}}"
    silent: false
    aliases:
      - build
      - generate
    cmds:
      - echo "🦀 Building Rust bindings library... {{.TARGET}}"
      - task: rust:crossbuild
        vars:
          ARGS: --config 'profile.release.strip="none"'
          TARGET: "{{.TARGET}}"
          PROFILE: "{{.PROFILE}}"
      # zigbuild always uses --target on Linux, so only target/<triple>/<profile>/ exists.
      # That artifact can lack UNIFFI_META* symbols (strip / linker); UniFFI Java bindgen needs them.
      # When building for the host, also produce target/<profile>/ via plain cargo build.
      - |
        set -eu
        HOST=$(rustc -vV | sed -n 's/^host: //p' | tr -d '\r' | xargs)
        TARGET=$(printf '%s' '{{.TARGET}}' | tr -d '\r' | xargs)
        if [[ "$TARGET" != "$HOST" ]]; then
          echo "🦀 Skip host-native cdylib (TARGET != host)."
          exit 0
        fi
        echo "🦀 Building host-native cdylib for UniFFI (cargo build, no --target)..."
        cd "{{.TASKFILE_DIR}}/../.."
        PROFILE="{{.PROFILE}}"
        if [[ "$PROFILE" == "release" ]]; then
          cargo build --release -p {{.BINDINGS_PACKAGE}} --locked --all-features
        else
          cargo build -p {{.BINDINGS_PACKAGE}} --locked --all-features
        fi
      - echo "🦀 Rust bindings library built successfully."

  lint:
    desc: Run Rust format check and clippy for the bindings crate
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - cargo fmt -p {{.BINDINGS_PACKAGE}} -- --check
      - cargo clippy -p {{.BINDINGS_PACKAGE}} --all-targets --locked --all-features -- -D warnings

  test:
    desc: Run the Rust tests for the bindings crate
    dir: "{{.TASKFILE_DIR}}/../.."
    vars:
      RELEASE:
        sh: '[[ {{.PROFILE}} == "release" ]] && echo "--release" || echo ""'
      ARGS: '{{.ARGS | default ""}}'
    cmds:
      - cargo test -p {{.BINDINGS_PACKAGE}} {{.RELEASE}} --locked --all-features --all-targets {{.ARGS}}

  clean:
    desc: Remove Cargo build artifacts for the bindings crate
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - cargo clean -p {{.BINDINGS_PACKAGE}}

  example:p2p:sender:
    desc: Start point to point SLIM sender example
    cmds:
      - cargo run --example sender -- --local agntcy/ns/bob --shared-secret {{.SHARED_SECRET}}  --session-type p2p --participants agntcy/ns/alice

  example:group:sender:
    desc: Start group SLIM sender example (agntcy/ns/alice and agntcy/ns/charlie receivers need to be running)
    cmds:
      - cargo run --example sender -- --local agntcy/ns/bob --shared-secret {{.SHARED_SECRET}}  --session-type group --participants agntcy/ns/alice agntcy/ns/charlie

  example:receiver:
    desc: SLIM receiver example (set local name by the LOCAL environment variable)
    cmds:
      - cargo run --example receiver -- --local {{.LOCAL}} --shared-secret {{.SHARED_SECRET}}
