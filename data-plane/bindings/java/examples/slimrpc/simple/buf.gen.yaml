version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: java_package_prefix
      value: com
inputs:
  - proto_file: example.proto
plugins:
  - remote: buf.build/protocolbuffers/java:v29.3
    out: types
  - local: ../../../../../slimrpc-compiler/target/release/protoc-gen-slimrpc-java
    out: slimrpc
