version: "3"

includes:
  adapter:
    taskfile: "../rust/Taskfile.yaml"
    internal: false
  rust:
    taskfile: ../../../tasks/rust.yaml
    internal: true
  tools:
    taskfile: ../../../tasks/tools.yaml
    internal: true
    flatten: true

vars:
  BINDINGS_DIR: "{{.TASKFILE_DIR}}/../rust"
  ##############################################################
  # Vars section does not have acces to importd variables
  # (PROFILE, CURRENT_TARGET, TARGET)
  # so we need to redefine them
  PROFILE: '{{.PROFILE | default "debug"}}'
  CURRENT_TARGET:
    sh: 'rustc -vV | sed -n "s|host: ||p"'
  TARGET: "{{.TARGET | default .CURRENT_TARGET}}"
  ##############################################################
  SERVICE_TARGET:
    sh: echo "{{.TASKFILE_DIR}}/../../target/{{.TARGET}}/{{.PROFILE}}"
  LIB_NAME: slim_bindings
  _DEFAULT_LIB_PATH: "{{.SERVICE_TARGET}}/lib{{.LIB_NAME}}.a"
  LIB_PATH: "{{.LIB_PATH | default ._DEFAULT_LIB_PATH}}"

tasks:
  default:
    cmds:
      - echo {{.TARGET}} {{.SERVICE_TARGET}}
      - task -l

  patch-cgo-directives:
    desc: Patch generated Go bindings with proper cgo directives
    internal: true
    vars:
      VERSION: '{{.VERSION | default "devel"}}'
    cmds:
      - echo "Patching cgo directives..."
      - |
        GO_FILE="slim_bindings/{{.LIB_NAME}}.go"
        if [ -f "$GO_FILE" ]; then
          # Create the new cgo preamble with static LDFLAGS placeholders
          cat > /tmp/cgo_preamble.txt << 'EOF'
        package slim_bindings

        /*
        #cgo CFLAGS: -I${SRCDIR}
        #cgo linux,amd64 LDFLAGS: -L${SRCDIR} -L${SRCDIR}/../../../../../.cgo-cache/slim-bindings/{{.VERSION}} -lslim_bindings_x86_64_linux_gnu -lm
        #cgo linux,arm64 LDFLAGS: -L${SRCDIR} -L${SRCDIR}/../../../../../.cgo-cache/slim-bindings/{{.VERSION}} -lslim_bindings_aarch64_linux_gnu -lm
        #cgo darwin,amd64 LDFLAGS: -L${SRCDIR} -L${SRCDIR}/../../../../../.cgo-cache/slim-bindings/{{.VERSION}} -lslim_bindings_x86_64_darwin -Wl,-undefined,dynamic_lookup
        #cgo darwin,arm64 LDFLAGS: -L${SRCDIR} -L${SRCDIR}/../../../../../.cgo-cache/slim-bindings/{{.VERSION}} -lslim_bindings_aarch64_darwin -Wl,-undefined,dynamic_lookup
        #cgo windows,amd64 LDFLAGS: -L${SRCDIR} -L${SRCDIR}/../../../../../.cgo-cache/slim-bindings/{{.VERSION}} -lslim_bindings_x86_64_windows_gnu -lws2_32 -lbcrypt -ladvapi32 -luserenv -lntdll -lgcc_eh -lgcc -lkernel32 -lole32
        #include <slim_bindings.h>
        */
        import "C"
        EOF

          # Extract the rest of the file after 'import "C"'
          sed -n '/^import "C"/,$p' "$GO_FILE" | tail -n +2 > /tmp/go_rest.txt

          # Combine the new preamble with the rest of the file
          cat /tmp/cgo_preamble.txt /tmp/go_rest.txt > "$GO_FILE"

          # Cleanup
          rm -f /tmp/cgo_preamble.txt /tmp/go_rest.txt
          echo "Patched $GO_FILE with cgo directives"
        else
          echo "Go file not found: $GO_FILE"
          exit 1
        fi
    silent: true

  patch-header:
    desc: Patch slim_bindings.h with Windows dllexport directives
    internal: true
    cmds:
      - echo "Patching slim_bindings.h..."
      - |
        HEADER_FILE="slim_bindings/{{.LIB_NAME}}.h"
        if [ -f "$HEADER_FILE" ]; then
          # Check if patch is already applied
          if grep -q "#ifdef _WIN32" "$HEADER_FILE" && grep -q "__declspec(dllexport) void slim_bindings_uniffiFutureContinuationCallback" "$HEADER_FILE"; then
            echo "Header already patched"
          else
            # Apply the patch: wrap the two function declarations with Windows conditional
            # First, create a temporary file with the patched content
            awk '
              /^void slim_bindings_uniffiFutureContinuationCallback\(uint64_t, int8_t\);$/ {
                print "#ifdef _WIN32"
                print "__declspec(dllexport) void slim_bindings_uniffiFutureContinuationCallback(uint64_t, int8_t);"
                print "__declspec(dllexport) void slim_bindings_uniffiFreeGorutine(uint64_t);"
                print "#else"
                print "void slim_bindings_uniffiFutureContinuationCallback(uint64_t, int8_t);"
                getline
                print "void slim_bindings_uniffiFreeGorutine(uint64_t);"
                print "#endif"
                next
              }
              { print }
            ' "$HEADER_FILE" > "$HEADER_FILE.tmp"
            mv "$HEADER_FILE.tmp" "$HEADER_FILE"
            echo "Patched $HEADER_FILE with Windows dllexport directives"
          fi
        else
          echo "Header file not found: $HEADER_FILE"
          exit 1
        fi
    silent: true

  generate:
    desc: Generate Go bindings from compiled library
    deps:
      # bindings:build:all is skipped automatically when the library already
      # exists and sources have not changed (sources/generates fingerprinting).
      - task: adapter:bindings:build:all
      - task: install-uniffi-bindgen-go
    vars:
      VERSION: '{{.VERSION | default "devel"}}'
    cmds:
      - echo "Generating Go bindings from compiled library..."
      - |
        uniffi-bindgen-go \
          --library '{{.LIB_PATH}}' \
          --out-dir '.' \
      - task: copy-library
      - task: patch-header
      - task: patch-cgo-directives
        vars:
          VERSION: '{{.VERSION}}'
      - echo "Bindings generated in slim_bindings/"
    silent: true

  generate-from-cache:
    desc: Generate Go bindings using a cached native library
    deps:
      - task: install-uniffi-bindgen-go
    vars:
      VERSION: '{{.VERSION | default "devel"}}'
    cmds:
      - echo "Generating Go bindings from cached library..."
      - |
        set -euo pipefail

        TARGET_OS="{{.TARGETOS}}"
        TARGET_ARCH="{{.TARGETARCH}}"
        TARGET_ABI="{{.TARGETABI}}"

        if [ -z "$TARGET_OS" ]; then
          TARGET_OS="$(go env GOOS)"
        fi
        if [ -z "$TARGET_ARCH" ]; then
          TARGET_ARCH="$(go env GOARCH)"
        fi

        case "$TARGET_OS" in
          darwin)
            if [ "$TARGET_ARCH" = "arm64" ]; then
              LIB_ARCH="aarch64"
            else
              LIB_ARCH="x86_64"
            fi
            LIB_NAME="lib{{.LIB_NAME}}_${LIB_ARCH}_darwin.a"
            ;;
          linux)
            if [ -z "$TARGET_ABI" ]; then
              TARGET_ABI="gnu"
            fi
            if [ "$TARGET_ARCH" = "arm64" ]; then
              LIB_ARCH="aarch64"
            else
              LIB_ARCH="x86_64"
            fi
            LIB_NAME="lib{{.LIB_NAME}}_${LIB_ARCH}_linux_${TARGET_ABI}.a"
            ;;
          windows)
            if [ -z "$TARGET_ABI" ]; then
              TARGET_ABI="gnu"
            fi
            if [ "$TARGET_ARCH" != "amd64" ] && [ "$TARGET_ARCH" != "x86_64" ]; then
              echo "Unsupported TARGETARCH for windows: $TARGET_ARCH"
              exit 1
            fi
            LIB_NAME="lib{{.LIB_NAME}}_x86_64_windows_${TARGET_ABI}.a"
            ;;
          *)
            echo "Unsupported TARGETOS: $TARGET_OS"
            exit 1
            ;;
        esac

        GOPATH_DIR=$(go env GOPATH)
        CACHE_DIR="$GOPATH_DIR/.cgo-cache/slim-bindings/{{.VERSION}}"
        LIB_PATH="$CACHE_DIR/$LIB_NAME"

        if [ ! -f "$LIB_PATH" ]; then
          echo "Cached bindings library not found: $LIB_PATH"
          exit 1
        fi

        uniffi-bindgen-go \
          --library "$LIB_PATH" \
          --out-dir '.' \

      - task: patch-header
      - task: patch-cgo-directives
        vars:
          VERSION: '{{.VERSION}}'
      - echo "Bindings generated in slim_bindings/"
    silent: true

  install-uniffi-bindgen-go:
    desc: Install uniffi-bindgen-go
    status:
      - which uniffi-bindgen-go
    cmds:
      - echo "Installing uniffi-bindgen-go..."
      - cargo install uniffi-bindgen-go --git https://github.com/NordSecurity/uniffi-bindgen-go.git --tag v0.5.0+v0.29.5 --config net.git-fetch-with-cli=true
    silent: true

  copy-library:
    desc: Copy the static library for the current target to the generated directory
    internal: true
    cmds:
      - echo "Copying static library for {{.TARGET}}..."
      - |
        LIB_PATH='{{.LIB_PATH}}'
        DEST_DIR="slim_bindings"

        if [ ! -f "$LIB_PATH" ]; then
          echo "Library not found: $LIB_PATH"
          exit 1
        fi

        # Derive destination name matching the -l flags in slim_bindings.go cgo directives:
        # lib{{.LIB_NAME}}_${ARCH}_${OS}.a        (e.g. libslim_bindings_aarch64_darwin.a)
        # lib{{.LIB_NAME}}_${ARCH}_${OS}_${ABI}.a (e.g. libslim_bindings_x86_64_linux_gnu.a)
        TARGET="{{.TARGET}}"
        ARCH=$(echo "$TARGET" | cut -d'-' -f1)
        OS=$(echo  "$TARGET" | cut -d'-' -f3)
        ABI=$(echo "$TARGET" | cut -d'-' -f4)

        case "$LIB_PATH" in
          *.lib) LIB_EXT="lib"; LIB_PREFIX="" ;;
          *)     LIB_EXT="a";   LIB_PREFIX="lib" ;;
        esac

        if [ -n "$ABI" ]; then
          DEST_NAME="${LIB_PREFIX}{{.LIB_NAME}}_${ARCH}_${OS}_${ABI}.${LIB_EXT}"
        else
          DEST_NAME="${LIB_PREFIX}{{.LIB_NAME}}_${ARCH}_${OS}.${LIB_EXT}"
        fi

        file_size=$(stat -f%z "$LIB_PATH" 2>/dev/null || stat -c%s "$LIB_PATH" 2>/dev/null)
        echo "   $TARGET → $DEST_NAME ($((file_size / 1024 / 1024))MB)"
        cp "$LIB_PATH" "$DEST_DIR/$DEST_NAME"
      - echo "Libraries in slim_bindings/:"
      - ls -lah "slim_bindings/"*{{.LIB_NAME}}*.a "slim_bindings/"*{{.LIB_NAME}}*.lib 2>/dev/null || echo "  (no library files found)"
    silent: true

  generate-proto:
    desc: "Generate proto files for the Python bindings"
    deps:
      - task: rust:toolchain:run-command
        vars:
          COMMAND: |
            cargo build --package agntcy-protoc-slimrpc-plugin --bin protoc-gen-slimrpc-go --release
      - task: tools:buf
    cmds:
      - |
        # Find all the buf.gen.yaml files in the current directory and its subdirectories
        find . -name 'buf.gen.yaml' | while read -r file; do
          # Generate the proto files using buf
          echo "Generating proto files for $file"
          # get folder name
          folder=$(dirname "$file")
          pushd > /dev/null ${folder} && {{.TOOLS_INSTALL_DIR}}/buf generate && popd > /dev/null
        done

  test:
    desc: Run all tests
    deps:
      - task: generate
    cmds:
      - echo "Running all tests..."
      - go test -v ./...
      - echo "All Go tests passed"
    silent: true

  test-coverage:
    desc: Run tests with coverage report
    deps:
      - task: adapter:bindings:build:all
        vars:
          PROFILE: release
    cmds:
      - echo "Running tests with coverage..."
      - go test -v -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated in coverage.html"
    silent: true

  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning build artifacts..."
      - cd {{.BINDINGS_DIR}} && cargo clean
      - rm slim_bindings/slim_bindings.go || true
      - rm slim_bindings/slim_bindings.h || true
      - rm slim_bindings/libslim_bindings_*.a || true
      - echo "Clean complete"
    silent: true

  # Examples
  build:
    desc: Build all example binaries
    deps:
      - task: adapter:bindings:build:all
        vars:
          PROFILE: release
    dir: examples/slimrpc/simple
    cmds:
      - go build -o slimrpc-go-server ./cmd/server
      - go build -o slimrpc-go-client ./cmd/client
      - go build -o slimrpc-go-group-client ./cmd/client_group
    silent: true

  examples:server:
    desc: Run the SLIM server
    deps:
      - build
    dir: examples/server
    cmds:
      - echo "Starting SLIM server..."
      - go run . {{.CLI_ARGS}}
    silent: true

  examples:p2p:alice:
    desc: Run Alice (receiver) for point-to-point example
    deps:
      - build
    dir: examples/point_to_point
    cmds:
      - echo "Starting Alice (receiver)..."
      - go run . --local="org/alice/app" --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:p2p:no-mls:bob:
    desc: Run Bob (sender) for point-to-point example
    deps:
      - build
    dir: examples/point_to_point
    cmds:
      - echo "Starting Bob (sender)..."
      - go run . --local="org/bob/app" --remote="org/alice/app" --message="Hello SLIM" --iterations=5 --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:p2p:mls:bob:
    desc: Run Bob (sender) for point-to-point example
    deps:
      - build
    dir: examples/point_to_point
    cmds:
      - echo "Starting Bob (sender)..."
      - go run . --enable-mls --local="org/bob/app" --remote="org/alice/app" --message="Hello SLIM" --iterations=5 --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:group:moderator:
    desc: Run group moderator (creates session and invites participants)
    deps:
      - build
    dir: examples/group
    cmds:
      - echo "Starting group moderator..."
      - go run . --local="org/moderator/app" --remote="org/default/chat-room" --invites="org/alice/app,org/bob/app" --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:group:participant:alice:
    desc: Run group participant (waits for invitation)
    deps:
      - build
    dir: examples/group
    cmds:
      - echo "Starting group participant..."
      - go run . --local="org/alice/app" --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:group:participant:bob:
    desc: Run group participant (waits for invitation)
    deps:
      - build
    dir: examples/group
    cmds:
      - echo "Starting group participant..."
      - go run . --local="org/bob/app" --server="http://localhost:46357" {{.CLI_ARGS}}
    silent: true

  examples:rpc:server:
    desc: Run the SlimRPC server example
    deps:
      - build
    dir: examples/slimrpc/simple
    cmds:
      - echo "Starting SlimRPC server (instance={{.INSTANCE}})..."
      - go run ./cmd/server -instance={{.INSTANCE}} {{.CLI_ARGS}}
    vars:
      INSTANCE: '{{.INSTANCE | default "server"}}'
    silent: true

  examples:rpc:client:
    desc: Run the SlimRPC client example
    deps:
      - build
    dir: examples/slimrpc/simple
    cmds:
      - echo "Starting SlimRPC client..."
      - go run ./cmd/client {{.CLI_ARGS}}
    silent: true

  examples:rpc:group-client:
    desc: Run the SlimRPC group (multicast) client example
    deps:
      - build
    dir: examples/slimrpc/simple
    cmds:
      - echo "Starting SlimRPC group client..."
      - go run ./cmd/client_group {{.CLI_ARGS}}
    silent: true
