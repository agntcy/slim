version: '3'

includes:
  rust:
    taskfile: ../rust/Taskfile.yaml
    # Must be callable so generate can invoke rust:bindings:build:all for local builds
    internal: false
  tools:
    taskfile: ../../../tasks/tools.yaml
    internal: true
    flatten: true

vars:
  # Rust bindings directory
  BINDINGS_DIR: "{{.TASKFILE_DIR}}/../rust"

  # Rust library name
  LIB_NAME: slim_bindings
  PROFILE: '{{.PROFILE | default "debug"}}'

  # Current target
  CURRENT_TARGET:
    sh: 'rustc -vV | sed -n "s|host: ||p"'
  TARGET: "{{.TARGET | default .CURRENT_TARGET}}"

  # Target directory for built libraries
  TARGET_DIR: "{{.BINDINGS_DIR}}/../../target"
  _DEFAULT_LIB_PATH:
    sh: echo "{{.TARGET_DIR}}/{{.TARGET}}/{{.PROFILE}}/lib{{.LIB_NAME}}.a"
  LIB_PATH: "{{.LIB_PATH | default ._DEFAULT_LIB_PATH}}"

  # Runtimes directory for NuGet packaging
  RUNTIMES_DIR: "{{.TASKFILE_DIR}}/runtimes"

  # Generated bindings directory
  GENERATED_DIR: "{{.TASKFILE_DIR}}/Slim/generated"

  # Output directory for NuGet packages
  OUTPUT_DIR: '{{.OUTPUT_DIR | default "./nupkg"}}'

  # CI artifacts (optional; when set, generate uses pre-built bindings from artifacts)
  ARTIFACTS_DIR: '{{.ARTIFACTS_DIR | default ""}}'
  BINDGEN_TARGET: '{{.BINDGEN_TARGET | default .TARGET}}'

  # Supported platforms for NuGet packaging
  # Format: TARGET|RID|LIB_EXT
  # Note: x86_64-pc-windows-gnu is excluded due to RID collision with MSVC.
  # .NET RIDs cannot differentiate between GNU and MSVC toolchains for win-x64.
  PLATFORMS: |
    x86_64-unknown-linux-gnu|linux-x64|so
    aarch64-unknown-linux-gnu|linux-arm64|so
    x86_64-unknown-linux-musl|linux-musl-x64|so
    aarch64-unknown-linux-musl|linux-musl-arm64|so
    x86_64-apple-darwin|osx-x64|dylib
    aarch64-apple-darwin|osx-arm64|dylib
    x86_64-pc-windows-msvc|win-x64|dll
    aarch64-pc-windows-msvc|win-arm64|dll

env:
  PATH: "{{.TOOLS_INSTALL_DIR}}/zig:{{.PATH}}"

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task -l

  resolve-version:
    desc: "Test version resolution (for debugging): Resolve version from VERSION, TAG_NAME, or Cargo.toml (in priority order)"
    vars:
      VERSION_PARAM: '{{.VERSION | default ""}}'
      TAG_NAME_PARAM: '{{.TAG_NAME | default ""}}'
    cmds:
      - |
        # Priority 1: Explicit VERSION parameter (highest priority)
        if [[ -n "{{.VERSION_PARAM}}" ]]; then
          echo "{{.VERSION_PARAM}}"
          exit 0
        fi

        # Priority 2: Extract from TAG_NAME parameter
        if [[ -n "{{.TAG_NAME_PARAM}}" ]]; then
          TAG="{{.TAG_NAME_PARAM}}"
          # Remove 'slim-bindings-' prefix if present
          VERSION="${TAG#slim-bindings-}"
          # Remove leading 'v' if present (e.g., v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          echo "$VERSION"
          exit 0
        fi

        # Priority 3: Fallback to Cargo.toml
        grep '^version = ' ../rust/Cargo.toml | sed 's/version = "\(.*\)"/\1/'

  install-uniffi-bindgen-cs:
    desc: "Install uniffi-bindgen-cs for C# bindings generation"
    status:
      - which uniffi-bindgen-cs
    cmds:
      # PR #163: uniffi v0.30/v0.31 support - https://github.com/NordSecurity/uniffi-bindgen-cs/pull/163
      # Revert to released tag when merged: --tag v0.10.0+v0.29.4 (or v0.11.0+v0.31 when released)
      - cargo install uniffi-bindgen-cs --git https://github.com/jmbryan4/uniffi-bindgen-cs.git --branch upgrade/uniffi-rs-0.31.0-clean --config net.git-fetch-with-cli=true
    silent: true


  generate:
    desc: "Generate C# bindings from the target folder"
    deps:
      - task: rust:bindings:build:all
        vars:
          PROFILE: "{{.PROFILE}}"
          TARGET: "{{.TARGET}}"
      - install-uniffi-bindgen-cs
    cmds:
      - |
        ARTIFACTS_DIR="{{.ARTIFACTS_DIR}}"
        BINDGEN_TARGET="{{.BINDGEN_TARGET}}"

        lib_file=""

        # Try CI artifacts directory first (when ARTIFACTS_DIR is set)
        if [[ -n "$ARTIFACTS_DIR" ]]; then
          artifact_dir="$ARTIFACTS_DIR/bindings-${BINDGEN_TARGET}"
          if [[ -d "$artifact_dir" ]]; then
            lib_file=$(find "$artifact_dir" -maxdepth 1 -name "lib{{.LIB_NAME}}*.a" -type f | head -1)
          fi
        fi

        # Fall back to local build: build Rust library, then use its output
        if [[ -z "$lib_file" || ! -f "$lib_file" ]]; then
          echo "No CI artifacts found, building Rust library locally..."
          (cd {{.BINDINGS_DIR}} && task bindings:build:all PROFILE="{{.PROFILE}}")

          local_lib="{{.LIB_PATH}}"
          if [[ -f "$local_lib" ]]; then
            echo "Using local build output: $local_lib"
            lib_file="$local_lib"
          fi
        fi

        if [[ -z "$lib_file" || ! -f "$lib_file" ]]; then
          echo "ERROR: Static library (.a) not found."
          [[ -n "$ARTIFACTS_DIR" ]] && echo "Checked CI artifacts dir: $ARTIFACTS_DIR/bindings-${BINDGEN_TARGET}"
          echo "Checked local build path: {{.LIB_PATH}}"
          exit 1
        fi

        echo "Generating C# bindings from: $lib_file"

        rm -rf {{.GENERATED_DIR}}
        mkdir -p {{.GENERATED_DIR}}
        uniffi-bindgen-cs --library --out-dir {{.GENERATED_DIR}} "$lib_file"

        if [[ ! -f "{{.GENERATED_DIR}}/slim_bindings.cs" ]]; then
          echo "ERROR: Failed to generate slim_bindings.cs"
          exit 1
        fi

        # Make all bindings types public so protoc-gen-slimrpc-csharp output and Agntcy.Slim.SlimRpc can use FFI from any assembly.
        # uniffi-bindgen-cs emits internal by default (including abstract handler bases). Order: most specific patterns first.
        # uniffi-bindgen-cs also emits namespace-scope types with default (internal) visibility
        # (no leading keyword). Promote those too so public members are consistent (CS0050/CS0051).
        sed -i.bak -e 's/^internal static partial class /public static partial class /' \
            -e 's/^internal sealed class /public sealed class /' \
            -e 's/^internal abstract class /public abstract class /' \
            -e 's/^internal static class /public static class /' \
            -e 's/^internal partial class /public partial class /' \
            -e 's/^internal readonly struct /public readonly struct /' \
            -e 's/^internal struct /public struct /' \
            -e 's/^internal class /public class /' \
            -e 's/^internal interface /public interface /' \
            -e 's/^internal record /public record /' \
            -e 's/^internal enum /public enum /' \
            -e 's/^static class /public static class /' \
            -e 's/^struct /public struct /' \
            -e 's/^interface /public interface /' \
            -e 's/^delegate /public delegate /' \
            -e 's/^class /public class /' \
            "{{.GENERATED_DIR}}/slim_bindings.cs"
        rm -f "{{.GENERATED_DIR}}/slim_bindings.cs.bak"

        echo "C# bindings generated successfully"
      - task: copy:runtimes
    silent: true

  copy:runtimes:
    desc: "Copy runtime libraries from target folder to runtimes directory"
    cmds:
      - rm -rf {{.RUNTIMES_DIR}}
      - mkdir -p {{.RUNTIMES_DIR}}
      - |
        runtime_count=0

        # Scan all target/*/release/ directories for dynamic libraries
        for target_release_dir in "{{.TARGET_DIR}}"/*/{{.PROFILE}}; do
          [[ -d "$target_release_dir" ]] || continue

          target=$(basename "$(dirname "$target_release_dir")")

          # Look up the target in PLATFORMS to get RID and extension
          rid=""
          ext=""
          while IFS='|' read -r platform_target platform_rid platform_ext; do
            if [[ "$platform_target" == "$target" ]]; then
              rid="$platform_rid"
              ext="$platform_ext"
              break
            fi
          done <<< "{{.PLATFORMS}}"

          # Skip if target not in our supported platforms list
          if [[ -z "$rid" || -z "$ext" ]]; then
            echo "  Skipping $target (not in PLATFORMS list)"
            continue
          fi

          # Determine source file and destination name
          case "$ext" in
            so|dylib)
              src="$target_release_dir/lib{{.LIB_NAME}}.$ext"
              lib_name="libuniffi_{{.LIB_NAME}}.$ext"
              ;;
            dll)
              src="$target_release_dir/{{.LIB_NAME}}.$ext"
              lib_name="uniffi_{{.LIB_NAME}}.$ext"
              ;;
          esac

          if [[ ! -f "$src" ]]; then
            echo "  $target: library not found ($src)"
            continue
          fi

          runtime_dir="{{.RUNTIMES_DIR}}/$rid/native"
          mkdir -p "$runtime_dir"
          cp "$src" "$runtime_dir/$lib_name"
          echo "  $target → $rid/native/$lib_name"
          runtime_count=$((runtime_count + 1))
        done

        if [[ $runtime_count -eq 0 ]]; then
          echo "No runtime libraries found under {{.TARGET_DIR}}"
          exit 1
        fi

        echo ""
        echo "Successfully copied $runtime_count runtime libraries:"
        find {{.RUNTIMES_DIR}} -type f -exec ls -lh {} \;
    silent: true

  build:
    desc: "Build the .NET solution (expects UniFFI bindings already generated; runs slimrpc proto codegen for the example)"
    deps:
      - task: generate
      - task: slimrpc:generate-proto
    cmds:
      - |
        if [[ ! -f "{{.GENERATED_DIR}}/slim_bindings.cs" ]]; then
          echo "ERROR: C# bindings not found. Run 'task generate' first."
          exit 1
        fi
        echo "Building .NET solution..."
        dotnet build Slim.sln --configuration Release
        echo "Build completed successfully"
    silent: true

  test:
    desc: "Run smoke tests (no server required)"
    cmds:
      - |
        echo "Running smoke tests..."
        dotnet test Slim.Tests/Slim.Tests.csproj --configuration Release --filter "FullyQualifiedName~SmokeTests" --verbosity normal
        echo "Tests completed successfully"
    silent: true

  pack:
    desc: "Create NuGet package (expects runtimes already copied)"
    vars:
      VERSION_RESOLVED:
        sh: task resolve-version VERSION="{{.VERSION}}" TAG_NAME="{{.TAG_NAME}}"
    cmds:
      - |
        if [[ ! -d "{{.RUNTIMES_DIR}}" ]] || [[ -z "$(ls -A {{.RUNTIMES_DIR}})" ]]; then
          echo "ERROR: No runtime libraries found. Run 'task copy:runtimes' first."
          exit 1
        fi

        VERSION="{{.VERSION_RESOLVED}}"
        OUTPUT_DIR="{{.OUTPUT_DIR}}"

        echo "Creating NuGet package version $VERSION..."
        echo "Runtime libraries included:"
        ls -1 {{.RUNTIMES_DIR}}

        mkdir -p "$OUTPUT_DIR"
        dotnet pack Slim/Slim.csproj --configuration Release --output "$OUTPUT_DIR" -p:Version="$VERSION"
        dotnet pack Slim.SlimRpc/Slim.SlimRpc.csproj --configuration Release --output "$OUTPUT_DIR" -p:Version="$VERSION"

        echo ""
        echo "Successfully created NuGet packages:"
        ls -lh "$OUTPUT_DIR"/*.nupkg
    silent: true

  format:
    desc: "Format the C# code"
    cmds:
      - |
        echo "Formatting C# code (whitespace)..."
        dotnet format whitespace --exclude Slim/generated/ Slim.Examples.SlimRpc/Generated/
        echo "Formatting C# code (style)..."
        dotnet format style --exclude Slim/generated/ Slim.Examples.SlimRpc/Generated/
        echo "Code formatted"
    silent: true

  lint:
    desc: "Check code formatting without applying changes"
    cmds:
      - |
        echo "Linting C# code (whitespace)..."
        dotnet format whitespace --verify-no-changes --exclude Slim/generated/ Slim.Examples.SlimRpc/Generated/
        echo "Linting C# code (style)..."
        dotnet format style --verify-no-changes --exclude Slim/generated/ Slim.Examples.SlimRpc/Generated/
        echo "Lint passed"
    silent: true

  ci:
    desc: "Run complete CI pipeline: generate bindings, copy runtimes, build, test, and pack"
    vars:
      VERSION_RESOLVED:
        sh: task resolve-version VERSION="{{.VERSION}}" TAG_NAME="{{.TAG_NAME}}"
    cmds:
      - |
        echo "=================================================="
        echo "  .NET Bindings CI Pipeline"
        echo "=================================================="
        echo "Output:    {{.OUTPUT_DIR}}"
        echo "Version:   {{.VERSION_RESOLVED}}"
        echo ""
      - task: generate
      - task: copy:runtimes
      - task: lint
      - task: build
      - task: test
      - task: pack
        vars:
          VERSION: "{{.VERSION_RESOLVED}}"
          TAG_NAME: "{{.TAG_NAME}}"
          OUTPUT_DIR: "{{.OUTPUT_DIR}}"
      - |
        echo ""
        echo "=================================================="
        echo "  CI Pipeline completed successfully"
        echo "=================================================="
    silent: true

  clean:
    desc: "Clean all build artifacts"
    cmds:
      - |
        echo "Cleaning build artifacts..."
        dotnet clean Slim.sln 2>/dev/null || true
        rm -rf {{.RUNTIMES_DIR}} {{.GENERATED_DIR}} nupkg/ Slim/bin/ Slim/obj/ Slim.Tests/bin/ Slim.Tests/obj/
        rm -rf Slim.SlimRpc/bin/ Slim.SlimRpc/obj/
        rm -rf Slim.Examples.SlimRpc/bin/ Slim.Examples.SlimRpc/obj/ Slim.Examples.SlimRpc/Generated/
        echo "Clean completed"
    silent: true

  slimrpc:generate-proto:
    desc: "Build protoc-gen-slimrpc-csharp and run buf generate for Slim.Examples.SlimRpc"
    cmds:
      - |
        echo "Building protoc-gen-slimrpc-csharp..."
        cd {{.TASKFILE_DIR}}/../../slimrpc-compiler
        cargo build --release --bin protoc-gen-slimrpc-csharp --target-dir ../target
        echo "Plugin built"
      - task: buf
      - |
        echo "Running buf generate for Slim.Examples.SlimRpc..."
        cd {{.TASKFILE_DIR}}/Slim.Examples.SlimRpc
        {{.TOOLS_INSTALL_DIR}}/buf generate
        echo "Proto code generated"
    silent: true

  slimrpc:build:
    desc: "Build the slimrpc example project (via full solution build)"
    cmds:
      - task: build
    silent: true

  examples:rpc:server:
    desc: "Run the SlimRPC server example"
    deps:
      - task: build
    cmds:
      - echo "Starting SlimRPC server (instance={{.INSTANCE}})..."
      - dotnet run --project Slim.Examples.SlimRpc --no-build --configuration Release -- --mode server --instance {{.INSTANCE}} {{.CLI_ARGS}}
    vars:
      INSTANCE: '{{.INSTANCE | default "server"}}'
      CLI_ARGS: '{{.CLI_ARGS | default ""}}'
    silent: true

  examples:rpc:client:
    desc: "Run the SlimRPC client example"
    deps:
      - task: build
    cmds:
      - echo "Starting SlimRPC client..."
      - dotnet run --project Slim.Examples.SlimRpc --no-build --configuration Release -- --mode client {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{.CLI_ARGS | default ""}}'
    silent: true

  examples:rpc:group-client:
    desc: "Run the SlimRPC group (multicast) client example"
    deps:
      - task: build
    cmds:
      - echo "Starting SlimRPC group client..."
      - dotnet run --project Slim.Examples.SlimRpc --no-build --configuration Release -- --mode group-client {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{.CLI_ARGS | default ""}}'
    silent: true
