# West node configuration for a 2-node east-west topology
# with route propagation. West connects to East as a client.

tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    node_id: slim-west
    dataplane:
      servers:
        - endpoint: "0.0.0.0:46358"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:46357"
          connection_type: peer
          tls:
            insecure: true
