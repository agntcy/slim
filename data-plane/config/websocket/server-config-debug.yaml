# Debug config with detailed logging
tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      servers:
        - endpoint: "ws://0.0.0.0:46357"
          transport: websocket
          tls:
            insecure: true
      clients: []
