tracing:
  log_level: info
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      servers:
        - endpoint: "wss://0.0.0.0:46357"
          transport: websocket
          tls:
            source:
              type: file
              cert: ./config/crypto/server-cert.pem
              key: ./config/crypto/server-key.pem
      clients: []
