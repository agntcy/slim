tracing:
  log_level: info
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      clients:
        - endpoint: "wss://localhost:46357"
          transport: websocket
          server_name: "localhost"
          tls:
            ca_source:
              type: file
              path: "./config/crypto/server-ca-cert.pem"
      servers: []
