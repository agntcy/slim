[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "armv7-unknown-linux-gnu" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2025-0141", # bincode unmaintained
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "Zlib",
]
# Ignore local workspace license values for unpublished crates.
private = { ignore = true }
confidence-threshold = 0.8
exceptions = [
    { name = "duration-string", version = "0.5.3", allow = ["Apache-2.0", "MIT"] },
]

[bans]
# TODO: Remove duplicate dependencies.
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
deny = [
    # rustls-webpki is the correct one
    { name = "webpki" },
]
skip = [
    # getrandom 0.3 (via rand 0.9) vs 0.4 (via uuid / tempfile) — both uncontrollable
    { name = "getrandom", version = "=0.3.4" },
    # hashbrown 0.15 (via petgraph/prost-build) vs 0.16 (via indexmap) — both uncontrollable
    { name = "hashbrown", version = "=0.15.5" },
    # untrusted 0.7 (via aws-lc-rs) vs 0.9 (via rustls-webpki) — both uncontrollable
    { name = "untrusted", version = "=0.7.1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
