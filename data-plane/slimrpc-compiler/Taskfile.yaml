version: '3'

includes:
  rust:
    taskfile: ../../tasks/rust.yaml
    internal: true

tasks:
  default:
    cmds:
      - task -l

  build:csharp:
    desc: Build protoc-gen-slimrpc-csharp for local use
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - cargo build --release --bin protoc-gen-slimrpc-csharp
    silent: true

  crossbuild:
    desc: Cross-compile the slimrpc-compiler
    dir: "{{.TASKFILE_DIR}}"
    silent: true
    cmds:
      - echo "🦀 Building slimrpc-compiler... {{.TARGET}}"
      - task: rust:crossbuild
      - echo "🦀 slimrpc-compiler built successfully."