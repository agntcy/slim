# SLIM node-c
tracing:
  log_level: debug

services:
  slim/node-c:
    group_name: deployment-c
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46102"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46102"
    controller:
      servers:
        - endpoint: "127.0.0.1:47102"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
