# SLIM node-a (used as hub in star topologies)
tracing:
  log_level: debug

services:
  slim/node-a:
    group_name: deployment-a
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46100"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46100"
    controller:
      servers:
        - endpoint: "127.0.0.1:47100"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
