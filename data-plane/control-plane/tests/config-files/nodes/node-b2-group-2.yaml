# SLIM node-a (used as hub in star topologies)
tracing:
  log_level: debug

services:
  slim/node-b2:
    group_name: group-2
    node_id: node-b2
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46103"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46103"
    controller:
      servers:
        - endpoint: "127.0.0.1:47103"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true

    peers:
      deployment_name: "group-2"
      topology: "full_mesh"
      static_peers:
        - node_id: "node-a2"
          endpoint: "http://127.0.0.1:46102"
          tls:
            insecure: true
        - node_id: "node-b2"
          endpoint: "http://127.0.0.1:46103"
          tls:
            insecure: true