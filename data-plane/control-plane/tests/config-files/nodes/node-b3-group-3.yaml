# SLIM node-a (used as hub in star topologies)
tracing:
  log_level: debug

services:
  slim/node-b3:
    group_name: group-3
    node_id: node-b3
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46105"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46105"
    controller:
      servers:
        - endpoint: "127.0.0.1:47105"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true

    peers:
      deployment_name: "group-3"
      topology: "full_mesh"
      static_peers:
        - node_id: "node-a3"
          endpoint: "http://127.0.0.1:46104"
          tls:
            insecure: true
        - node_id: "node-b3"
          endpoint: "http://127.0.0.1:46105"
          tls:
            insecure: true