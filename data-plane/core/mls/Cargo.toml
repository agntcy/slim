[package]
name = "agntcy-slim-mls"
edition = { workspace = true }
license = { workspace = true }
version = "0.1.15"
description = "Messaging Layer Security for SLIM data plane."

[lib]
name = "slim_mls"

[features]
default = ["native"]
native = [
    "agntcy-slim-auth/native",
    "agntcy-slim-datapath/native",
    "dep:mls-rs-crypto-awslc",
    "dep:tokio",
    "tokio/macros",
    "tokio/rt",
]
wasm = [
    "agntcy-slim-auth/wasm",
    "agntcy-slim-datapath/wasm",
    "dep:mls-rs-crypto-webcrypto",
    "dep:getrandom",
]

[dependencies]
agntcy-slim-auth = { workspace = true, default-features = false }
agntcy-slim-datapath = { workspace = true, default-features = false }
agntcy-slim-version = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
getrandom = { version = "0.3", features = ["wasm_js"], optional = true }
hex = "0.4"
mls-rs = { workspace = true }
mls-rs-core = { workspace = true }
mls-rs-crypto-awslc = { workspace = true, optional = true }
mls-rs-crypto-webcrypto = { version = "0.12", optional = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
tempfile = "3.3"
