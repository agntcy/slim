[package]
name = "agntcy-slim-session"
edition = { workspace = true }
license = { workspace = true }
version = "0.1.12"
description = "SLIM session internal implementation."

[lib]
name = "slim_session"

[features]
default = ["native"]
native = [
    "agntcy-slim-auth/native",
    "agntcy-slim-datapath/native",
    "agntcy-slim-mls/native",
    "dep:display-error-chain",
    "dep:futures",
    "dep:futures-timer",
    "dep:tokio",
    "dep:tokio-util",
    "dep:tonic",
]
wasm = [
    "agntcy-slim-auth/wasm",
    "agntcy-slim-datapath/wasm",
    "agntcy-slim-mls/wasm",
    "dep:getrandom",
    "dep:futures-channel",
    "dep:futures-core",
    "dep:gloo-timers",
    "dep:wasm-bindgen-futures",
]

[dependencies]
agntcy-slim-auth = { workspace = true, default-features = false }
agntcy-slim-datapath = { workspace = true, default-features = false }
agntcy-slim-mls = { workspace = true, default-features = false }
agntcy-slim-version = { workspace = true }
async-trait = { workspace = true }
display-error-chain = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
futures-channel = { version = "0.3", optional = true }
futures-core = { version = "0.3", optional = true }
futures-timer = { workspace = true, optional = true }
getrandom = { version = "0.3", features = ["wasm_js"], optional = true }
gloo-timers = { version = "0.3", features = ["futures"], optional = true }
maybe-async = "0.2.10"
parking_lot = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
tracing = { workspace = true }
wasm-bindgen-futures = { version = "0.4", optional = true }

[dev-dependencies]
agntcy-slim-testing = { workspace = true }
tracing-test = { workspace = true }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ["cfg(mls_build_async)"]
