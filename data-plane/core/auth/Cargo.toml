[package]
name = "agntcy-slim-auth"
version = "0.9.0"
license = { workspace = true }
edition = { workspace = true }
description = "Authentication utilities for the Agntcy Slim framework"

[package.metadata.cargo-machete]
# `getrandom` is pulled in only to enable its `wasm_js` backend so that `rand`
# works on wasm32; it is never referenced directly.
ignored = ["getrandom"]

[lib]
name = "slim_auth"

[features]
default = []
# Generate Curve25519 (Ed25519) MLS signature keys instead of the default
# NIST P-256 keys. Must match the ciphersuite selected in `slim_mls`.
curve25519 = []

# Dependencies shared by the always-available core modules (errors,
# identity_claims, metadata, shared_secret, traits) on every target,
# including wasm32.
[dependencies]
agntcy-slim-version = { workspace = true }
base64 = { workspace = true }
cfg-if = { workspace = true }
http = { workspace = true }
itoa = "1"
parking_lot = { workspace = true }
prost-types = { workspace = true }
rand = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
trait-variant = { workspace = true }

[target.'cfg(all(not(target_family = "windows"), not(target_arch = "wasm32")))'.dependencies]
spiffe = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
aws-lc-rs = { workspace = true }
display-error-chain = { workspace = true }
futures = { workspace = true }
headers = { workspace = true }
jsonwebtoken = { workspace = true }
mls-rs-core = { workspace = true }
mls-rs-crypto-awslc = { workspace = true }
notify = { workspace = true }
oauth2 = { workspace = true, features = ["reqwest"] }
pin-project = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tokio-util = { workspace = true }
tower = { workspace = true }
tower-layer = { workspace = true }
tower-service = { workspace = true }
url = { workspace = true }
wiremock = { workspace = true }

# Pure-Rust HMAC-SHA256 backend for SharedSecret on wasm32 (aws-lc-rs is
# native-only). `getrandom` with the wasm_js backend is required so that
# `rand` works in the browser.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { workspace = true }
hmac = { workspace = true }
js-sys = { workspace = true }
sha2 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
agntcy-slim-config = { path = "../config" }
agntcy-slim-testing = { path = "../../testing" }
criterion = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "process", "fs"] }
tokio-test = { workspace = true }
tracing-test = { workspace = true }
# uuid moved to optional dependency under [dependencies] for feature = "testutils"

[[bench]]
name = "shared_secret_benchmark"
harness = false

