[package]
name = "agntcy-slim-service"
edition = { workspace = true }
license = { workspace = true }
version = "0.8.11"
description = "Main service and public API to interact with SLIM data plane."

[lib]
name = "slim_service"
crate-type = ["lib"]

[features]
default = ["native", "session"]
native = [
    "agntcy-slim-auth/native",
    "agntcy-slim-config/native",
    "agntcy-slim-controller/native",
    "agntcy-slim-datapath/native",
    "agntcy-slim-mls/native",
    "agntcy-slim-session?/native",
    "display-error-chain",
    "tokio",
    "tokio-util",
]
wasm = [
    "agntcy-slim-auth/wasm",
    "agntcy-slim-config/wasm",
    "agntcy-slim-controller/wasm",
    "agntcy-slim-datapath/wasm",
    "agntcy-slim-mls/wasm",
    "agntcy-slim-session?/wasm",
]
session = ["agntcy-slim-session"]

[dependencies]
agntcy-slim-auth = { workspace = true }
agntcy-slim-config = { workspace = true }
agntcy-slim-controller = { workspace = true }
agntcy-slim-datapath = { workspace = true }
agntcy-slim-mls = { workspace = true }
agntcy-slim-session = { workspace = true, optional = true }
agntcy-slim-version = { workspace = true }
async-trait = { workspace = true }
display-error-chain = { workspace = true, optional = true }
futures = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
agntcy-slim-testing = { workspace = true }
tokio-test = { workspace = true }
tracing-test = { workspace = true, features = ["no-env-filter"] }
