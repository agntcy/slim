[package]
name = "agntcy-slim-controller"
version = "0.5.0"
edition = { workspace = true }
license = { workspace = true }
description = "Controller service and control API to configure the SLIM data plane through the control plane."
# proto/ holds the canonical controller.proto; src/api/gen/ holds pre-generated code for published packages
include = ["src/**", "build.rs", "proto/**"]

[lib]
name = "slim_controller"

[features]
default = ["native"]
native = [
    "agntcy-slim-auth/native",
    "agntcy-slim-config/native",
    "agntcy-slim-datapath/native",
    "agntcy-slim-session/native",
    "agntcy-slim-signal/native",
    "agntcy-slim-tracing/native",
    "display-error-chain",
    "drain",
    "h2",
    "tokio",
    "tokio-stream",
    "tokio-util",
    "tonic",
    "tonic-prost",
]
wasm = [
    "agntcy-slim-auth/wasm",
    "agntcy-slim-config/wasm",
    "agntcy-slim-datapath/wasm",
    "agntcy-slim-session/wasm",
    "agntcy-slim-tracing/wasm",
]

[dependencies]
agntcy-slim-auth = { workspace = true }
agntcy-slim-config = { workspace = true }
agntcy-slim-datapath = { workspace = true }
agntcy-slim-session = { workspace = true }
agntcy-slim-signal = { workspace = true, optional = true }
agntcy-slim-tracing = { workspace = true }
agntcy-slim-version = { workspace = true }
display-error-chain = { workspace = true, optional = true }
drain = { workspace = true, optional = true }
duration-string = { workspace = true }
h2 = { workspace = true, optional = true }
parking_lot = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"], optional = true }
tokio-stream = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[build-dependencies]
protoc-bin-vendored = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
agntcy-slim-testing = { workspace = true }
tracing-test = { workspace = true }
