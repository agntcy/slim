[package]
name = "agntcy-slim-datapath"
version = "0.12.3"
edition = { workspace = true }
license = { workspace = true }
description = "Core data plane functionality for SLIM"

[package.metadata.cargo-machete]
ignored = ["getrandom"]

[lib]
name = "slim_datapath"

[features]
default = ["native"]
native = [
    "dep:agntcy-slim-config",
    "agntcy-slim-config/native",
    "dep:agntcy-slim-tracing",
    "agntcy-slim-tracing/native",
    "dep:display-error-chain",
    "dep:drain",
    "dep:fastwebsockets",
    "dep:h2",
    "dep:opentelemetry",
    "dep:tokio",
    "dep:tokio-stream",
    "dep:tokio-util",
    "dep:tonic",
    "dep:tonic-prost",
    "dep:tracing-opentelemetry",
]
wasm = [
    "dep:agntcy-slim-config",
    "agntcy-slim-config/wasm",
    "dep:agntcy-slim-tracing",
    "agntcy-slim-tracing/wasm",
    "dep:display-error-chain",
    "dep:getrandom",
    "dep:tokio_with_wasm",
    "dep:tokio-stream",
    "dep:wasm-bindgen-futures",
    "uuid/js",
]

[dependencies]

# Optional config/tracing — wasm and native each enable their flavor.
agntcy-slim-config = { workspace = true, optional = true, default-features = false }
agntcy-slim-tracing = { workspace = true, optional = true, default-features = false }
# Always available (core types, messages, tables)
agntcy-slim-version = { workspace = true }
display-error-chain = { workspace = true, optional = true }
drain = { workspace = true, optional = true }
fastwebsockets = { workspace = true, optional = true }
getrandom = { version = "0.3", features = ["wasm_js"], optional = true }
h2 = { workspace = true, optional = true }
http = { workspace = true }
opentelemetry = { workspace = true, optional = true }
parking_lot = { workspace = true }
prost = { workspace = true }
rand = { workspace = true }
semver = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tokio_with_wasm = { version = "0.9", features = ["rt", "sync", "time", "macros"], optional = true }
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true, optional = true }
twox-hash = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
wasm-bindgen-futures = { version = "0.4", optional = true }

# Browser-only websocket transport for the wasm build. `gloo-net` only compiles
# for `wasm32-*` targets, so it is added unconditionally for that target and
# omitted everywhere else; it is gated on the `wasm` feature inside `lib.rs`.
[target.'cfg(target_arch = "wasm32")'.dependencies]
futures = { workspace = true }
gloo-net = { version = "0.6" }

[build-dependencies]
protoc-bin-vendored = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tracing-test = { workspace = true, features = ["no-env-filter"] }

[[bench]]
name = "pool_benchmark"
harness = false
