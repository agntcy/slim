[package]
name = "agntcy-slim-tracing"
edition = { workspace = true }
license = { workspace = true }
version = "0.3.8"
description = "Observability for SLIM data plane: logs, traces and metrics infrastructure."

[lib]
name = "slim_tracing"

[features]
default = ["native"]
native = [
    "dep:agntcy-slim-config",
    "dep:opentelemetry",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-semantic-conventions",
    "dep:opentelemetry-stdout",
    "dep:opentelemetry_sdk",
    "dep:tracing-opentelemetry",
    "dep:tracing-subscriber",
]
wasm = ["dep:tracing-subscriber", "dep:getrandom", "dep:web-sys", "uuid/js"]

[dependencies]

# Native-only dependencies (OpenTelemetry stack)
agntcy-slim-config = { workspace = true, optional = true, features = ["native"] }
agntcy-slim-version = { workspace = true }

# WASM support for uuid randomness
getrandom = { version = "0.3", features = ["wasm_js"], optional = true }
once_cell = { workspace = true }
opentelemetry = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
opentelemetry-stdout = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true, optional = true }

# Shared optional (used by both native and wasm)
tracing-subscriber = { workspace = true, optional = true, features = ["env-filter"] }
uuid = { workspace = true }

# WASM browser console output
web-sys = { version = "0.3", features = ["console"], optional = true }

[package.metadata.cargo-machete]
ignored = ["getrandom"]
