[package]
name = "agntcy-slim-config"
version = "0.9.0"
edition = { workspace = true }
license = { workspace = true }
description = "Configuration utilities"

[package.metadata.cargo-machete]
ignored = ["getrandom"]

[lib]
name = "slim_config"

[[bin]]
name = "generate-schema"
path = "src/schema/generate_schema.rs"

[features]
default = ["native"]
native = [
    "dep:agntcy-slim-auth",
    "dep:bytes",
    "dep:display-error-chain",
    "dep:drain",
    "dep:fastwebsockets",
    "dep:futures",
    "dep:http-body-util",
    "dep:hyper",
    "hyper-util/client-proxy-system",
    "dep:hyper-rustls",
    "dep:hyper-util",
    "dep:parking_lot",
    "dep:prost",
    "dep:rustls",
    "dep:rustls-native-certs",
    "dep:rustls-pki-types",
    "dep:tokio",
    "tokio/io-util",
    "tokio/macros",
    "tokio/net",
    "tokio/rt",
    "tokio/rt-multi-thread",
    "tokio/sync",
    "tokio/time",
    "dep:tokio-retry",
    "dep:tokio-rustls",
    "dep:tokio-stream",
    "dep:tokio-util",
    "dep:tonic",
    "dep:tonic-prost",
    "dep:tonic-tls",
    "dep:tower-layer",
    "dep:tower-service",
]
wasm = ["dep:getrandom", "dep:gloo-net", "uuid/js"]

[dependencies]
agntcy-slim-auth = { workspace = true, optional = true, features = ["native"] }
agntcy-slim-version = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true, optional = true }
display-error-chain = { workspace = true, optional = true }
drain = { workspace = true, optional = true }
duration-string = { workspace = true }
fastwebsockets = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
getrandom = { version = "0.3", features = ["wasm_js"], optional = true }
gloo-net = { version = "0.6", optional = true }
http = { workspace = true }
http-body-util = { workspace = true, optional = true }
hyper = { workspace = true, optional = true }
hyper-rustls = { workspace = true, optional = true }
hyper-util = { workspace = true, optional = true }
lazy_static = { workspace = true }
parking_lot = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
rand = { workspace = true }
regex = { workspace = true }
rustls = { workspace = true, optional = true }
rustls-native-certs = { workspace = true, optional = true }
rustls-pki-types = { workspace = true, optional = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tokio-retry = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
tonic-tls = { workspace = true, optional = true }
tower = { workspace = true }
tower-http = { workspace = true }
tower-layer = { workspace = true, optional = true }
tower-service = { workspace = true, optional = true }
tracing = { workspace = true }
tracing-test = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[build-dependencies]
protoc-bin-vendored = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
agntcy-slim-testing = { workspace = true }
serde_json = { workspace = true }
tracing-test = { workspace = true }
