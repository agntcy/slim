<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGNTCY SLIM Architecture Visualizer</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons for UI -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Decoupled Modular Styling -->
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
</head>
<body>

  <div class="app-grid">
    
    <!-- 2D Viewport -->
    <main class="viewport">
      
      <!-- Journey controls + playback -->
      <div class="graph-controls">
        <div class="journey-pills" role="tablist" aria-label="Message journey">
          <button class="journey-btn active j-p2p" data-journey="p2p" role="tab" aria-selected="true">
            <i class="fa-solid fa-message" aria-hidden="true"></i>
            <span>Point-to-Point Message</span>
          </button>
          <button class="journey-btn j-multicast" data-journey="multicast" role="tab" aria-selected="false">
            <i class="fa-solid fa-share-nodes" aria-hidden="true"></i>
            <span>Multicast Message</span>
          </button>
        </div>
        <div class="graph-controls-actions">
          <button type="button" class="graph-control-btn" id="btn-step-pause" title="Pause" aria-label="Pause playback">
            <i class="fa-solid fa-pause" id="btn-step-pause-icon" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Arrow stepper (v3) -->
      <section class="arrow-stepper-wrap" aria-label="Journey step navigation">
        <div id="step-tooltip" class="step-tooltip" hidden>
          <div id="step-tooltip-title" class="step-tooltip__title"></div>
          <div id="step-tooltip-desc" class="step-tooltip__desc"></div>
        </div>
        <div id="arrow-stepper" class="arrow-stepper" role="tablist" aria-label="Journey steps"></div>
      </section>

      <div class="viewport-stage">
      
      <!-- SVG Node Graph -->
      <svg class="visual-graph" viewBox="0 0 826 396" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

        <rect class="diagram-backdrop" width="100%" height="100%" fill="var(--diagram-surface)" />

        <g id="paths-group">
          <path id="path_A_to_Node1" class="connection-path" d="M 162 159 C 200 159, 215 180, 225 200"/>
          <path id="path_E_to_Node1" class="connection-path" d="M 162 259 C 200 259, 215 230, 225 220"/>
          <path id="path_Node1_to_Node2" class="connection-path" d="M 385 200 C 405 200, 416 200, 436 200"/>
          <path id="path_Node2_to_B" class="connection-path" d="M 596 200 C 630 180, 645 120, 660 92"/>
          <path id="path_Node2_to_C" class="connection-path" d="M 596 200 L 660 200"/>
          <path id="path_Node2_to_D" class="connection-path" d="M 596 200 C 630 250, 645 290, 660 308"/>
          <path id="path_Node1_to_MCP" class="connection-path" d="M 280 245 C 270 270, 240 300, 197 343"/>
          <path id="path_Operator_to_Node1" class="connection-path control" d="M 220 80 C 240 100, 250 130, 260 155"/>
          <path id="path_Controller_to_Node1" class="connection-path control" d="M 380 72 C 360 100, 330 130, 305 155"/>
          <path id="path_Controller_to_Node2" class="connection-path control" d="M 440 72 C 470 100, 500 130, 516 155"/>
        </g>

        <!-- Dynamic Particles Container -->
        <g id="particles-group"></g>

        <!-- Node Layout -->
        <g id="nodes-group">

          <g id="node_Operator" class="interactive-node" cursor="pointer">
            <rect id="core_Operator" class="node-rect node-rect--operator node-rect--peripheral" x="123" y="16" width="148" height="64" rx="12"/>
            <text x="135" y="34" font-size="14px">💻</text>
            <text class="node-title" x="193" y="42" text-anchor="middle">Operator Terminal</text>
            <text class="node-desc" x="193" y="56" text-anchor="middle">Human input / slimctl</text>
            <text id="badge_Operator" class="node-badge" x="193" y="70" text-anchor="middle">Local CLI</text>
          </g>

          <g id="node_Controller" class="interactive-node" cursor="pointer">
            <rect class="node-rect controller node-rect--peripheral" x="336" y="16" width="148" height="56" rx="12"/>
            <text class="node-title" x="410" y="38" text-anchor="middle">SLIM Controller</text>
            <text class="node-desc" x="410" y="54" text-anchor="middle">Control Plane</text>
          </g>

          <g id="node_Agent_A" class="interactive-node" cursor="pointer">
            <rect id="core_Agent_A" class="node-rect agent node-rect--sender" x="14" y="115" width="148" height="88" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/claude.svg" x="26" y="127" width="18" height="18" class="agent-logo-img claude-logo"/>
            <text class="node-title" x="88" y="144" text-anchor="middle">Agent A</text>
            <text class="node-desc" x="88" y="160" text-anchor="middle">Sender Client</text>
            <text id="badge_Agent_A" class="node-badge" x="88" y="190" text-anchor="middle" fill="var(--color-teal)">MLS: Inactive</text>
          </g>

          <g id="node_Agent_E" class="interactive-node" cursor="pointer">
            <rect id="core_Agent_E" class="node-rect agent" x="14" y="215" width="148" height="88" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/langgraph.svg" x="26" y="227" width="18" height="18" class="agent-logo-img langgraph-logo"/>
            <text class="node-title" x="88" y="244" text-anchor="middle">Agent E</text>
            <text class="node-desc" x="88" y="260" text-anchor="middle">Local Subscriber</text>
            <text id="badge_Agent_E" class="node-badge" x="88" y="290" text-anchor="middle" fill="var(--color-teal)">MLS: Inactive</text>
          </g>

          <g id="node_Node1" class="interactive-node" cursor="pointer">
            <rect id="core_Node1" class="node-rect router" x="225" y="155" width="160" height="90" rx="12"/>
            <text class="node-title" x="305" y="186" text-anchor="middle">SLIM Node 1</text>
            <text class="node-desc" x="305" y="202" text-anchor="middle">Local Data Plane</text>
            <text id="badge_Node1" class="node-badge" x="305" y="228" text-anchor="middle">Active (3)</text>
          </g>

          <g id="node_Node2" class="interactive-node" cursor="pointer">
            <rect id="core_Node2" class="node-rect router node-rect--remote" x="436" y="155" width="160" height="90" rx="12"/>
            <text class="node-title" x="516" y="186" text-anchor="middle">SLIM Node 2</text>
            <text class="node-desc" x="516" y="202" text-anchor="middle">Remote Data Plane</text>
            <text id="badge_Node2" class="node-badge" x="516" y="228" text-anchor="middle">Active (4)</text>
          </g>

          <g id="node_Agent_B" class="interactive-node" cursor="pointer">
            <rect id="core_Agent_B" class="node-rect agent" x="660" y="48" width="148" height="88" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/crewai.svg" x="672" y="60" width="18" height="18" class="agent-logo-img crewai-logo"/>
            <text class="node-title" x="734" y="77" text-anchor="middle">Agent B</text>
            <text class="node-desc" x="734" y="93" text-anchor="middle">Subscriber Node</text>
            <text id="badge_Agent_B" class="node-badge" x="734" y="123" text-anchor="middle" fill="var(--color-teal)">MLS: Inactive</text>
          </g>

          <g id="node_Agent_C" class="interactive-node" cursor="pointer">
            <rect id="core_Agent_C" class="node-rect agent" x="660" y="156" width="148" height="88" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/opencode.svg" x="672" y="168" width="18" height="18" class="agent-logo-img opencode-logo"/>
            <text class="node-title" x="734" y="185" text-anchor="middle">Agent C</text>
            <text class="node-desc" x="734" y="201" text-anchor="middle">Subscriber Node</text>
            <text id="badge_Agent_C" class="node-badge" x="734" y="231" text-anchor="middle" fill="var(--color-teal)">MLS: Inactive</text>
          </g>

          <g id="node_Agent_D" class="interactive-node" cursor="pointer" opacity="0.4">
            <rect id="core_Agent_D" class="node-rect agent" x="660" y="264" width="148" height="88" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/langchain.svg" x="672" y="276" width="18" height="18" class="agent-logo-img langchain-logo"/>
            <text class="node-title" x="734" y="293" text-anchor="middle">Agent D</text>
            <text class="node-desc" x="734" y="309" text-anchor="middle">Subscriber Node</text>
            <text id="badge_Agent_D" class="node-badge" x="734" y="339" text-anchor="middle" fill="var(--color-teal)">MLS: Inactive</text>
          </g>

          <g id="node_MCP" class="interactive-node" cursor="pointer">
            <rect id="core_MCP" class="node-rect node-rect--mcp node-rect--peripheral" x="123" y="311" width="148" height="64" rx="12"/>
            <image href="https://unpkg.com/@lobehub/icons-static-svg@latest/icons/mcp.svg" x="135" y="323" width="18" height="18" class="agent-logo-img mcp-logo"/>
            <text class="node-title" x="193" y="337" text-anchor="middle">MCP Server</text>
            <text class="node-desc" x="193" y="351" text-anchor="middle">Model Context Protocol</text>
            <text id="badge_MCP" class="node-badge" x="193" y="365" text-anchor="middle">Files &amp; Search</text>
          </g>

        </g>
      </svg>
      </div>

      <!-- Protocol log (v3 compact) -->
      <section class="protocol-log" id="terminal-panel">
        <div class="protocol-log__header">
          <button
            type="button"
            class="protocol-log__toggle"
            id="btn-toggle-term"
            aria-expanded="true"
            aria-controls="terminal-body"
          >
            <span class="protocol-log__title">
              <span id="terminal-pulse" class="protocol-log__dot" aria-hidden="true"></span>
              <span>SLIM Networking Protocol Log</span>
            </span>
            <i class="fa-solid fa-chevron-down protocol-log__chevron" aria-hidden="true"></i>
          </button>
          <button type="button" class="protocol-log__clear" id="btn-clear-term" title="Clear logs">
            <i class="fa-solid fa-trash-can" aria-hidden="true"></i> Clear
          </button>
        </div>
        <div id="terminal-body" class="protocol-log__body"></div>
      </section>
    </main>

  </div>

  <div id="tooltip" class="tooltip-2d" hidden>
    <div id="tooltip-title" class="tooltip-title">Node Title</div>
    <div id="tooltip-desc" class="tooltip-desc">Description of node function.</div>
  </div>

  <!-- Decoupled Modular Scripts (Loaded sequentially for local file:// compatibility) -->
  <script src="js/config.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/particle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
