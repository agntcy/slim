# Retrieve with: kubectl -n spire-system get configmap spire-bundle-upstream -o jsonpath='{.data.bundle\.spiffe}'

tags:
  nestedChildFull: true

global:
  spire:
    trustDomain: slim.dev.outshift.ai
    upstreamSpireAddress: external.spire.slim.dev.outshift.ai
    clusterName: gls-cluster-0
    tools:
      kubectl:
        tag: "v1.28.0"

