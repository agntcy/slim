external-secrets-operator:
  operator:
    enabled: false

  externalSecrets:
    - name: 'join-token'
      secretStoreRef:
        name: "vault-espresso-backend"
        kind: "ClusterSecretStore"
      target:
        name: "join-token"
        template:
          engineVersion: v2
          data:
            join_token: '{{ index . "join-token" }}'
      data:
        - secretKey: join-token
          remoteRef:
              key: "gls/spire"
              property: join-token

spire-nested:
  upstream-spiffe-csi-driver:
    kubeletPath: /var/snap/microk8s/common/var/lib/kubelet

  downstream-spiffe-csi-driver:
    kubeletPath: /var/snap/microk8s/common/var/lib/kubelet

  external-root-spire-server-full:
    controllerManager:
      className: spire-spire

  # This is the spire server local application in the cluster will talk to.
  # It receives its CA from the upstream server.
  internal-spire-server:
    nodeSelector:
      spire-role: bridge
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 8Gi
    spiffe-csi-driver:
      kubeletPath: /var/snap/microk8s/common/var/lib/kubelet
    controllerManager:
      className: spire-spire
    env:
      - name: HTTP_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: HTTPS_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: http_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: https_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: NO_PROXY
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager
      - name: no_proxy
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager

  # This is the agent used to attest the child spire server against the upstream server
  upstream-spire-agent:
    nodeAttestor:
      k8sPSAT:
        enabled: false
    unsupportedBuiltInPlugins:
      nodeAttestor:
        join_token:
          plugin_data: {}
    extraVolumes:
      - name: join-token-file
        secret:
          secretName: join-token
    extraVolumeMounts:
      - name: join-token-file
        mountPath: /run/spire/join-token
        readOnly: true
    nodeSelector:
      spire-role: bridge
    spiffe-csi-driver:
      kubeletPath: /var/snap/microk8s/common/var/lib/kubelet
    extraEnvVars:
      - name: HTTP_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: HTTPS_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: http_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: https_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: NO_PROXY
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager
      - name: no_proxy
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager

  # This is the agent used by workloads in the cluster to talk to the local spire server
  downstream-spire-agent-full:
    spiffe-csi-driver:
      kubeletPath: /var/snap/microk8s/common/var/lib/kubelet
    extraEnvVars:
      - name: HTTP_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: HTTPS_PROXY
        value: http://proxy-wsa.esl.cisco.com:80
      - name: http_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: https_proxy
        value: http://proxy-wsa.esl.cisco.com:80
      - name: NO_PROXY
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager
      - name: no_proxy
        value: localhost,127.0.0.1,svc.cluster.local,10.0.0.0/8,192.168.0.0/16,172.16.0.0/16,172.18.0.0/16,kubernetes.default.svc,spire-server,spire-agent,spiffe-csi-driver,spire-controller-manager
