{{/*
Generate a Secret for the SLIM shared secret only when:
  - spire is not enabled (shared-secret auth is in use), AND
  - slim.secretRef.name is not set (no existing Secret provided), AND
  - slim.secret is non-empty
*/}}
{{- if and (not .Values.spire.enabled) (not .Values.slim.secretRef.name) .Values.slim.secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-troubleshooting-agent.fullname" . }}-slim-secret
  labels:
    {{- include "k8s-troubleshooting-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  slim-secret: {{ .Values.slim.secret | quote }}
{{- end }}
