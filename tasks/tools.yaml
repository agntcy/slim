version: "3"

silent: true

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel

  TOOLS_MODULE_DIR: "{{.REPO_ROOT}}/internal/tools"

  TOOLS_INSTALL_DIR: "{{.REPO_ROOT}}/.tools"

  TOOLS_PACKAGES:
    sh: |
      grep -E '\s+_\s+".*"' {{.TOOLS_MODULE_DIR}}/tools.go | \
        tr -d " _\"" | \
        grep -vE '/v[0-9]+$$' | \
        tr '\n' ' '

  ADDITIONAL_TOOLS: "protoc"

  TMP_FOLDER: ".tmp"

  PROTOC_URL: "https://github.com/protocolbuffers/protobuf/releases/download"

  PROTOC_VERSION: "29.0"

tasks:
  tools:foreach:
    internal: true
    desc: Run task for each tool
    cmds:
      - |
        for tool in {{.TOOLS_PACKAGES}}; do
          echo "Tool: ${tool}"
          {{.CMD}}
        done

  tools:dir:
    internal: true
    cmds:
      - mkdir -p {{.TOOLS_INSTALL_DIR}}
    status:
      - test -d {{.TOOLS_INSTALL_DIR}}

  tools:gomodtidy:
    internal: true
    desc: Install go modules in tools
    cmds:
      - cd {{.TOOLS_MODULE_DIR}} && go mod tidy

  tools:buf:
    internal: true
    desc: Install buf
    cmds:
      - |
        BIN="{{.TOOLS_INSTALL_DIR}}" && \
        VERSION="1.56.0" && \
        curl -sSL \
        "https://github.com/bufbuild/buf/releases/download/v${VERSION}/buf-$(uname -s)-$(uname -m)" \
        -o "${BIN}/buf" && \
        chmod +x "${BIN}/buf"
    status:
      - test -f {{.TOOLS_INSTALL_DIR}}/buf

  tools:protoc:
    deps:
      - tools:dir
    dir: "{{.TMP_FOLDER}}"
    cmds:
      - |
        A="{{ARCH}}"
        O="{{OS}}"
        [[ "{{ARCH}}" == "amd64" ]] && A="x86_64"
        [[ "{{ARCH}}" == "arm64" ]] && A="aarch_64"
        [[ "{{OS}}" == "darwin" ]] && O="osx"
        curl -L {{.PROTOC_URL}}/v{{.PROTOC_VERSION}}/protoc-{{.PROTOC_VERSION}}-$O-$A.zip -o protoc.zip
        unzip -o protoc.zip
        mv bin/protoc {{.TOOLS_INSTALL_DIR}}
        mv include {{.TOOLS_INSTALL_DIR}}
        rm -f protoc.zip
    status:
      - |
        for tool in {{.ADDITIONAL_TOOLS}}; do
          test -f {{.TOOLS_INSTALL_DIR}}/${tool}
        done

  # Download packages
  tools:go-tools:
    internal: true
    deps:
      - tools:dir
      - tools:gomodtidy
    cmds:
      - task: tools:foreach
        vars:
          CMD: |
            unset GOOS
            unset GOARCH
            bin_name="$(basename ${tool})"
            cd {{.TOOLS_MODULE_DIR}} && go build -o {{.TOOLS_INSTALL_DIR}}/${bin_name} -trimpath ${tool}
    status:
      - |
        for tool in {{.TOOLS_PACKAGES}}; do
          bin_name="$(basename ${tool})"
          test -f {{.TOOLS_INSTALL_DIR}}/${bin_name}
        done

  tools:
    desc: Download tools
    cmds:
      - task: tools:protoc
      - task: tools:go-tools

  tools:install-zig:
    desc: Install Zig locally for all platforms via direct download
    summary: |
      Installs Zig {{.ZIG_VERSION}} for {{.ZIG_ARCH}}-{{.ZIG_OS}} to {{.ZIG_INSTALL_DIR}}
      The executable is called {{.ZIG_INSTALL_DIR}}/zig/zig
    status:
      - test -f "{{.ZIG_INSTALL_DIR}}/zig/zig" || test -f "{{.ZIG_INSTALL_DIR}}/zig/zig.exe"
    requires:
      vars: [ZIG_INSTALL_DIR, ZIG_ARCH, ZIG_OS]
    vars:
      ZIG_VERSION: '{{.ZIG_VERSION | default "0.14.1"}}'
      EXTENSION:
        sh: |
          if [[ "{{.ZIG_OS}}" == "windows" ]]; then
            echo "zip"
          else
            echo "tar.xz"
          fi
      DOWNLOAD_BASE: "https://ziglang.org/download/{{.ZIG_VERSION}}/zig-{{.ZIG_ARCH}}-{{.ZIG_OS}}-{{.ZIG_VERSION}}.{{.EXTENSION}}"
    cmds:
      - echo "Installing Zig {{.ZIG_VERSION}} for {{.ZIG_ARCH}}-{{.ZIG_OS}} to {{.ZIG_INSTALL_DIR}} {{.EXTENSION}}"
      - mkdir -p "{{.ZIG_INSTALL_DIR}}"
      - echo "Downloaded Zig {{.ZIG_VERSION}} for {{.ZIG_ARCH}}-{{.ZIG_OS}} to {{.ZIG_INSTALL_DIR}}/zig.{{.EXTENSION}}"
      - |
        if [[ "{{.EXTENSION}}" == "zip" ]]; then
          unzip -q "{{.ZIG_INSTALL_DIR}}/zig.{{.EXTENSION}}" -d "{{.ZIG_INSTALL_DIR}}"
        else
          tar -xf "{{.ZIG_INSTALL_DIR}}/zig.{{.EXTENSION}}" -C "{{.ZIG_INSTALL_DIR}}"
        fi
      - mv "{{.ZIG_INSTALL_DIR}}/zig-{{.ZIG_ARCH}}-{{.ZIG_OS}}-{{.ZIG_VERSION}}" "{{.ZIG_INSTALL_DIR}}/zig"
      - rm "{{.ZIG_INSTALL_DIR}}/zig.{{.EXTENSION}}"
      - echo "Zig installed to {{.ZIG_INSTALL_DIR}}/zig"

  tools:uninstall-zig:
    desc: Uninstall Zig from the installation directory
    summary: |
      Removes Zig installation from {{.ZIG_INSTALL_DIR}}/zig
      This will delete the entire zig directory and all its contents
    requires:
      vars: [ZIG_INSTALL_DIR]
    preconditions:
      - test -d "{{.ZIG_INSTALL_DIR}}/zig"
    cmds:
      - echo "Uninstalling Zig from {{.ZIG_INSTALL_DIR}}/zig"
      - rm -rf "{{.ZIG_INSTALL_DIR}}/zig"
      - echo "Zig uninstalled successfully"
