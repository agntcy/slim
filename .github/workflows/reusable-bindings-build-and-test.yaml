---
name: reusable-bindings-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      tag-name:
        description: Git tag name for version extraction (e.g., slim-bindings-1.2.3)
        required: false
        type: string
        default: ""
      rust-workspace:
        description: Rust workspace directory for caching
        required: false
        type: string
        default: ./data-plane
      library-output-dir:
        description: Directory where the compiled library will be located
        required: false
        type: string
        default: ./data-plane/target/release
      library-name:
        description: Name of the compiled library (without lib prefix and extension)
        required: false
        type: string
        default: slim_bindings
      uniffi-bindgen-go-version:
        description: Version tag for uniffi-bindgen-go
        required: false
        type: string
        default: v0.4.0+v0.28.3
env:
  LIBRARY_NAME: slim_bindings
  PYTHON_VERSION: '3.11'

jobs:
  generate-matrix:
    name: Generate Platform Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      matrix-no-windows-gnu: ${{ steps.set-matrix.outputs.matrix-no-windows-gnu }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          # Define the complete platform matrix
          MATRIX=$(cat <<'MATRIX_EOF'
          {
            "platform": [
              {
                "runner": "ubuntu-24.04",
                "os": "linux",
                "target": "x86_64-unknown-linux-musl",
                "python-platform": "musllinux_1_2_x86_64",
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "ubuntu-24.04",
                "os": "linux",
                "target": "x86_64-unknown-linux-gnu",
                "python-platform": "manylinux_2_28_x86_64",
                "exclude": false
              },
              {
                "runner": "windows-11-arm",
                "os": "windows",
                "target": "aarch64-pc-windows-msvc",
                "python-platform": "win_arm64",
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "ubuntu-24.04",
                "os": "linux",
                "target": "aarch64-unknown-linux-musl",
                "python-platform": "musllinux_1_2_aarch64",
                "use_qemu": true,
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "ubuntu-24.04",
                "os": "linux",
                "target": "aarch64-unknown-linux-gnu",
                "python-platform": "manylinux_2_28_aarch64",
                "use_qemu": true,
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "windows-latest",
                "os": "windows",
                "target": "x86_64-pc-windows-msvc",
                "python-platform": "win_amd64",
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "ubuntu-24.04",
                "os": "linux",
                "target": "x86_64-pc-windows-gnu",
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "macos-15-intel",
                "os": "macos",
                "target": "x86_64-apple-darwin",
                "python-platform": "macosx_10_12_x86_64",
                "exclude": ${{ github.event_name == 'pull_request' }}
              },
              {
                "runner": "macos-15",
                "os": "macos",
                "target": "aarch64-apple-darwin",
                "python-platform": "macosx_11_0_arm64",
                "exclude": ${{ github.event_name == 'pull_request' }}
              }
            ],
            "exclude": [
              {
                "platform": {
                  "exclude": true
                }
              }
            ]
          }
          MATRIX_EOF
          )

          # Output full matrix for build job
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

          # Create filtered matrix (exclude windows-gnu for Python tests)
          MATRIX_NO_WIN_GNU=$(echo "$MATRIX" | jq -c '{platform: [.platform[] | select(.target != "x86_64-pc-windows-gnu")], exclude: .exclude}')
          echo "matrix-no-windows-gnu=$(echo "$MATRIX_NO_WIN_GNU" | jq -c .)" >> "$GITHUB_OUTPUT"

  build-libraries:
    needs: generate-matrix
    name: "${{ matrix.platform.target }}"
    runs-on: ${{ matrix.platform.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ./data-plane/bindings/rust
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ./data-plane
          cache-enabled: false
      - name: Build library
        working-directory: ./data-plane/bindings/rust
        env:
          PLATFORM_TARGET: ${{ matrix.platform.target }}
        run: |
          task bindings:build:all TARGET="$PLATFORM_TARGET" PROFILE=release
      - name: Upload libs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bindings-${{ matrix.platform.target }}
          path: ./data-plane/target/${{ matrix.platform.target }}/release/*slim_bindings*
      - name: Install uv
        if: "!contains(matrix.platform.target, 'windows-gnu')"
        uses: ./.github/actions/setup-python
        with:
          uv-install: 'true'
      - name: Generate python wheels
        if: "!contains(matrix.platform.target, 'windows-gnu')"
        working-directory: ./data-plane/bindings/python
        env:
          PLATFORM_TARGET: ${{ matrix.platform.target }}
        run: task python:bindings:packaging TARGET="$PLATFORM_TARGET" PROFILE=release
      - name: Upload wheels
        if: "!contains(matrix.platform.target, 'windows-gnu')"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ matrix.platform.target }}
          path: ./data-plane/bindings/python/dist

  go-bindings-build-and-test:
    runs-on: ${{ inputs.runner }}
    needs:
      - generate-matrix
      - build-libraries

    defaults:
      run:
        shell: bash
        working-directory: ./data-plane/bindings/go

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}
          cache-enabled: false

      - name: Setup Go
        uses: ./.github/actions/setup-go

      # Download all library artifacts and restore to target folder structure
      - name: Download libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ github.workspace }}/target-artifacts/

      - name: Restore libraries to target folder
        run: |
          echo "📦 Restoring artifacts to target folder..."
          for artifact_dir in "$GITHUB_WORKSPACE/target-artifacts/bindings-"*; do
            [ -d "$artifact_dir" ] || continue
            target=$(basename "$artifact_dir" | sed 's/^bindings-//')
            mkdir -p "$GITHUB_WORKSPACE/data-plane/target/$target/release/"
            find "$artifact_dir" -maxdepth 1 -type f -exec cp {} "$GITHUB_WORKSPACE/data-plane/target/$target/release/" \;
            echo "  Restored $target"
          done
          echo "📁 Restored libraries:"
          find "$GITHUB_WORKSPACE/data-plane/target" -name "*slim_bindings*" -type f | sort
          rm -rf "$GITHUB_WORKSPACE/target-artifacts"

      - name: Generate Go bindings
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          # Extract version from tag name if present (e.g., slim-bindings-v1.3.0 -> v1.3.0)
          VERSION="$TAG_NAME"
          VERSION="${VERSION#slim-bindings-}"
          VERSION="${VERSION:-devel}"

          task generate PROFILE=release VERSION="$VERSION"

          echo "📁 slim-bindings-go files:"
          find ./slim_bindings -type f

      - name: Make sure generation did not modify source files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ Generated Go bindings differ from committed files. Please commit the updated bindings."
            git status
            git --no-pager diff
            exit 1
          else
            echo "✅ Generated Go bindings are up-to-date with committed files."
          fi

      - name: Run Go bindings tests
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          # Extract version from tag name if present (e.g., slim-bindings-v1.3.0 -> v1.3.0)
          VERSION="$TAG_NAME"
          VERSION="${VERSION#slim-bindings-}"
          VERSION="${VERSION:-devel}"

          echo "Running Go bindings tests..."
          task test PROFILE=release VERSION="$VERSION"

      - name: Upload Generated Go code
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-bindings-generated-code
          path: |
            ./data-plane/bindings/go/slim_bindings
            !./data-plane/bindings/go/slim_bindings/*.a
            !./data-plane/bindings/go/slim_bindings/*.so
            !./data-plane/bindings/go/slim_bindings/*.dylib
            !./data-plane/bindings/go/slim_bindings/*.dll
            !./data-plane/bindings/go/slim_bindings/*.lib
          if-no-files-found: error

  python-bindings-test:
    name: Test Python Wheels (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    needs:
      - generate-matrix
      - build-libraries
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix-no-windows-gnu) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup QEMU for ARM64 emulation
        if: matrix.platform.use_qemu == true
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64

      - name: Setup Python (Windows/macOS only)
        if: matrix.platform.os != 'linux'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Python wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-${{ matrix.platform.target }}
          path: ./wheels/
          merge-multiple: true

      - name: List downloaded wheels
        run: |
          echo "📦 Downloaded wheels:"
          find ./wheels -type f -name "*.whl" -ls || echo "No wheels found"

      - name: Test wheel installation and usage (Linux with container)
        if: matrix.platform.os == 'linux'
        env:
          PLATFORM_TARGET: ${{ matrix.platform.target }}
          PYTHON_PLATFORM: ${{ matrix.platform.python-platform }}
        run: |
          echo "📦 Testing Python wheel"
          echo "🖥️  Platform: $PLATFORM_TARGET"

          # Determine platform for container selection
          if [[ "$PLATFORM_TARGET" == *"aarch64"* ]]; then
            PLATFORM="linux/arm64"
            echo "🔧 Using ARM64 platform"
          else
            PLATFORM="linux/amd64"
            echo "🔧 Using AMD64 platform"
          fi

          # Determine libc variant for container selection
          if [[ "$PLATFORM_TARGET" == *"musl"* ]]; then
            CONTAINER_IMAGE="python:$PYTHON_VERSION-alpine"
          else
            CONTAINER_IMAGE="python:$PYTHON_VERSION-slim"
          fi

          # Run test in container
          docker run --rm \
            --platform "$PLATFORM" \
            -v "$(pwd)/wheels:/wheels" \
            -v "$(pwd):/repo:ro" \
            -w /workspace \
            -e "PYTHON_PLATFORM=$PYTHON_PLATFORM" \
            -e "PLATFORM_TARGET=$PLATFORM_TARGET" \
            "$CONTAINER_IMAGE" \
            sh -c '
              TEST_DIR=$(mktemp -d)
              cd "$TEST_DIR"
              echo "📂 Testing in: $TEST_DIR"

              WHEEL=$(find /wheels -name "*${PYTHON_PLATFORM}*.whl" | head -1)
              if [ -z "$WHEEL" ]; then
                echo "❌ No wheel found for platform $PYTHON_PLATFORM"
                exit 1
              fi

              echo "📦 Installing wheel: $WHEEL"
              pip install "$WHEEL"
              echo "✅ Wheel installed successfully"

              python /repo/.github/tests/python/test_installation.py

              echo ""
              echo "🎉 All tests passed on $PLATFORM_TARGET!"
            '

      - name: Test wheel installation and usage (Windows/macOS)
        if: matrix.platform.os != 'linux'
        env:
          PLATFORM_TARGET: ${{ matrix.platform.target }}
          PLATFORM_RUNNER: ${{ matrix.platform.runner }}
          PYTHON_PLATFORM: ${{ matrix.platform.python-platform }}
        run: |
          echo "📦 Testing Python wheel"
          echo "🖥️  Platform: $PLATFORM_TARGET"
          echo "🏃 Runner: $PLATFORM_RUNNER"
          echo "📂 Testing in current directory"

          # Find and install the wheel for this platform
          WHEEL=$(find ./wheels -name "*${PYTHON_PLATFORM}*.whl" | head -1)
          if [ -z "$WHEEL" ]; then
            echo "❌ No wheel found for platform $PYTHON_PLATFORM"
            echo "Available wheels:"
            find ./wheels -name "*.whl"
            exit 1
          fi

          echo "📦 Installing wheel: $WHEEL"
          pip install "$WHEEL"
          echo "✅ Wheel installed successfully"

          # Run installation test
          python ./.github/tests/python/test_installation.py

          echo ""
          echo "🎉 All tests passed on $PLATFORM_TARGET!"

      - name: Test result summary
        if: success()
        env:
          PLATFORM_TARGET: ${{ matrix.platform.target }}
        run: |
          echo "✅ Python wheel verification completed successfully on $PLATFORM_TARGET"
          echo "The wheel can be safely published."

  dotnet-bindings-build-and-test:
    name: "Dotnet Bindings Build and Test"
    permissions:
      contents: read
    needs:
      - generate-matrix
      - build-libraries
    uses: ./.github/workflows/reusable-dotnet-build-and-test.yaml
    with:
      runner: ${{ inputs.runner }}
      rust-workspace: ${{ inputs.rust-workspace }}
      rust-target: x86_64-unknown-linux-gnu
      tag-name: ${{ inputs.tag-name }}

  kotlin-bindings-build-and-test:
    name: "Kotlin Bindings Build and Test"
    permissions:
      contents: read
    needs:
      - generate-matrix
      - build-libraries
    uses: ./.github/workflows/reusable-kotlin-build-and-test.yaml
    with:
      runner: ${{ inputs.runner }}
      rust-workspace: ${{ inputs.rust-workspace }}

  java-bindings-build-and-test:
    name: "Java Bindings Build and Test"
    permissions:
      contents: read
    needs:
      - generate-matrix
      - build-libraries
    uses: ./.github/workflows/reusable-java-build-and-test.yaml
    with:
      runner: ${{ inputs.runner }}
      rust-workspace: ${{ inputs.rust-workspace }}
