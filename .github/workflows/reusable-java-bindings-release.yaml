---
name: reusable-java-bindings-release

on:
  workflow_call:
    inputs:
      library-name:
        description: Name of the library
        required: false
        type: string
        default: slim_bindings
      java-version:
        description: Java version to use
        required: false
        type: string
        default: '21'
      java-bindings-working-directory:
        description: Working directory for Java bindings
        required: false
        type: string
        default: ./data-plane/bindings/java
      maven-group-id:
        description: Maven groupId
        required: false
        type: string
        default: io.agntcy.slim
      maven-artifact-id:
        description: Maven artifactId
        required: false
        type: string
        default: slim-bindings-java
    secrets:
      MVN_TOKEN_NAME:
        description: Maven Central token username (Central Portal)
        required: false
      MVN_TOKEN_PASSWORD:
        description: Maven Central token password (Central Portal)
        required: false
      GPG_SIGNING_KEY:
        description: ASCII-armored GPG private key for signing
        required: false
      GPG_PASSPHRASE:
        description: GPG key passphrase
        required: false

env:
  LIBRARY_NAME: ${{ inputs.library-name }}
  MAVEN_GROUP_ID: ${{ inputs.maven-group-id }}
  MAVEN_ARTIFACT_ID: ${{ inputs.maven-artifact-id }}

jobs:
  release-java-bindings:
    name: Release Java Bindings
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.java-bindings-working-directory }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ inputs.java-version }}

      # Download generated Java code and native libraries
      - name: Download generated Java code
        uses: actions/download-artifact@v4
        with:
          name: java-bindings-generated-code
          path: ${{ inputs.java-bindings-working-directory }}/generated/

      - name: List downloaded generated code
        run: |
          echo "📦 Downloaded generated code:"
          find ./generated -type f -name "*.java" | head -20
          echo "📦 Downloaded native libraries:"
          find ./generated/native -type f 2>/dev/null | sort || echo "No native libs in artifact"

      - name: Create Maven settings for GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      # Extract version from tag name (e.g., slim-bindings-v0.7.0 -> 0.7.0)
      - name: Extract version from tag
        id: extract-version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          # Remove 'slim-bindings-' prefix if present
          VERSION="${TAG_NAME#slim-bindings-}"
          # Remove leading 'v' if present (e.g., v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build and publish to GitHub Packages
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building and publishing Java bindings to GitHub Packages..."

          VERSION="${{ steps.extract-version.outputs.version }}"
          echo "Publishing version: $VERSION"

          mvn deploy \
            -Dproject.version="$VERSION" \
            -DskipTests

          echo "✅ Successfully published to GitHub Packages"
          echo "Package: ${{ env.MAVEN_GROUP_ID }}:${{ env.MAVEN_ARTIFACT_ID }}:$VERSION"
          echo "📦 View at: https://github.com/${{ github.repository }}/packages"

      # Publish to Maven Central (requires MVN_TOKEN_NAME, MVN_TOKEN_PASSWORD, GPG_SIGNING_KEY, GPG_PASSPHRASE)
      # Uses OSSRH Staging API (ossrh-staging-api.central.sonatype.com). OSSRH was shut down June 2025.
      # Requires Central Portal User Token: https://central.sonatype.org/publish/generate-portal-token/
      - name: Add Maven Central server to settings
        env:
          MVN_TOKEN_NAME: ${{ secrets.MVN_TOKEN_NAME }}
          MVN_TOKEN_PASSWORD: ${{ secrets.MVN_TOKEN_PASSWORD }}
        run: |
          # Add central server for Maven Central deploy (github deploy already completed)
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${MVN_TOKEN_NAME}</username>
                <password>${MVN_TOKEN_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Import GPG key for Maven Central signing
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_SIGNING_KEY" | gpg --batch --yes --import --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE"

      - name: Publish to Maven Central
        env:
          MVN_TOKEN_NAME: ${{ secrets.MVN_TOKEN_NAME }}
          MVN_TOKEN_PASSWORD: ${{ secrets.MVN_TOKEN_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "Publishing Java bindings to Maven Central..."
          VERSION="${{ steps.extract-version.outputs.version }}"
          echo "Publishing version: $VERSION"

          mvn deploy \
            -Dproject.version="$VERSION" \
            -DskipTests \
            -DaltDeploymentRepository=central::default::https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/

          # OSSRH Staging API: transfer deployment to Central Portal (required)
          # Namespace = first segment of groupId (io.agntcy for io.agntcy.slim)
          AUTH=$(echo -n "$MVN_TOKEN_NAME:$MVN_TOKEN_PASSWORD" | base64 | tr -d '\n')
          curl -sS -X POST \
            -H "Authorization: Bearer $AUTH" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.agntcy?publishing_type=automatic"
          echo "✅ Successfully published to Maven Central"
