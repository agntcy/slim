---
name: ci-integration-tests

on:
  push:
    paths:
      - 'tests/**'
      - 'control-plane/**'
      - 'data-plane/**'
    branches:
      - main
  pull_request:
    paths:
      - 'tests/**'
      - 'control-plane/**'
      - 'data-plane/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ./data-plane

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: '21'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup UV
        uses: ./.github/actions/setup-python
        with:
          uv-install: true

      - name: Run integration test suite
        working-directory: ./tests
        run: task tests:integration

  sessions-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ./data-plane

      - name: Run group communication integration test
        working-directory: ./data-plane/testing
        run: task test:group-session

      - name: Run point to point integration test
        working-directory: ./data-plane/testing
        run: task test:point-to-point-session
