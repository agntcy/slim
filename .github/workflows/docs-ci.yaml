# Docs PR checks: build + lint via the reusable docs pipeline (mode: ci).

name: Documentation CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-ci.yaml'
      - '.github/workflows/reusable-docs.yml'

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-docs.yml
    with:
      mode: ci
