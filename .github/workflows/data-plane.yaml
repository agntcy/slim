---
name: ci-test-and-build-data-plane

on:
  push:
    paths:
      - '.github/workflows/data-plane.yaml'
      - '.github/workflows/reusable-rust-build-and-test.yaml'
      - '.github/workflows/reusable-docker-build-push.yaml'
      - '.github/actions/setup-rust/action.yaml'
      - 'data-plane/**'
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/data-plane.yaml'
      - '.github/workflows/reusable-rust-build-and-test.yaml'
      - '.github/workflows/reusable-docker-build-push.yaml'
      - '.github/actions/setup-rust/action.yaml'
      - 'data-plane/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  data-plane-build-and-test:
    name: Data plane - build & test
    uses: ./.github/workflows/reusable-rust-build-and-test.yaml
    with:
      working-directory: ./data-plane

  data-plane-wasm32:
    name: Data plane - wasm32 check & clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./data-plane
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ./data-plane

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: wasm32 check (lib only)
        run: task data-plane:wasm32:check

      - name: wasm32 clippy (lib only)
        run: task data-plane:wasm32:clippy

  data-plane-docker-build:
    name: Build SLIM docker image
    uses: ./.github/workflows/reusable-docker-build-push.yaml
    with:
      bake-targets: slim
      image-tag: ${{ github.sha }}
