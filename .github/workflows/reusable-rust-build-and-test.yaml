---

name: reusable-rust-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      continue-on-error:
        description: Whether to skip the status update for this job
        required: false
        type: boolean
        default: false
      rust-toolchain:
        description: Toolchain to use
        required: false
        type: string
        default: stable
      rust-lint:
        description: Whether to run "task lint"
        required: false
        type: boolean
        default: true
      rust-vuln:
        description: Whether to run "task vuln"
        required: false
        type: boolean
        default: true
      rust-test:
        description: Whether to run "task test"
        required: false
        type: boolean
        default: true
      rust-cross-build:
        description: Whether to run "task build"
        required: false
        type: boolean
        default: true
      rust-cross-build-profiles:
        description: JSON array of cargo profiles to cross-build
        required: false
        type: string
        default: '["debug"]'
      rust-cross-build-arches:
        description: JSON array of target arches to cross-build
        required: false
        type: string
        default: '["x86_64"]'
      working-directory:
        description: Directory to run the task in
        required: false
        type: string
        default: .
      task-prefix:
        description: "Prefix to use for task commands (empty for top-level tasks)"
        type: string
        default: ""

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-lint }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: lint
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}lint"

  unittest-matrix:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-test }}
    needs: [lint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: Run Unit Tests
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}test"

  unittest:
    runs-on: ${{ inputs.runner }}

    if: ${{ inputs.rust-test }}

    needs: [lint, unittest-matrix]
    steps:
      - name: Print result
        run: echo ${{ needs.unittest-matrix.result }}
      - name: Interpret result
        run: |
          if [[ success == ${{ needs.unittest-matrix.result }} ]]
          then
            echo "All matrix jobs passed!"
          else
            echo "One or more matrix jobs failed."
            false
          fi

  cross-build:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    needs: [lint]

    if: ${{ inputs.rust-cross-build }}

    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [linux]
        profile: ${{ fromJSON(inputs.rust-cross-build-profiles) }}
        arch: ${{ fromJSON(inputs.rust-cross-build-arches) }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}
          # Each cell compiles distinct artifacts (target triple × profile), so
          # give each its own cache rather than sharing/overwriting the host
          # cache. This also warm-starts release builds — caching was previously
          # disabled for release, forcing a full ~24m cold recompile every run.
          cache-key-suffix: "-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.profile }}"

      - name: Build
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
          PROFILE: ${{ matrix.profile }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}build" TARGET="${ARCH}-unknown-${OS}-gnu" PROFILE="${PROFILE}"
