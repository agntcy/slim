---

name: reusable-rust-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      continue-on-error:
        description: Whether to skip the status update for this job
        required: false
        type: boolean
        default: false
      rust-toolchain:
        description: Toolchain to use
        required: false
        type: string
        default: stable
      rust-lint:
        description: Whether to run "task lint"
        required: false
        type: boolean
        default: true
      rust-vuln:
        description: Whether to run "task vuln"
        required: false
        type: boolean
        default: true
      rust-test:
        description: Whether to run "task test"
        required: false
        type: boolean
        default: true
      rust-test-coverage:
        description: Whether to run "task coverage"
        required: false
        type: boolean
        default: true
      rust-test-wasm:
        description: Whether to run "task test:wasm" (wasm32 browser unit tests)
        required: false
        type: boolean
        default: true
      rust-test-wasm-browser:
        description: Whether to run "task test:wasm:browser" (headless-browser WebSocket transport tests)
        required: false\
        type: boolean
        default: true
      rust-cross-build:
        description: Whether to run "task build"
        required: false
        type: boolean
        default: true
      working-directory:
        description: Directory to run the task in
        required: false
        type: string
        default: .
      task-prefix:
        description: "Prefix to use for task commands (empty for top-level tasks)"
        type: string
        default: ""

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-lint }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: lint
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}lint"

  test-coverage:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-test-coverage }}
    needs: [lint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: Run `coverage`
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}test:coverage"

  unittest-matrix:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-test }}
    needs: [lint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: Run Unit Tests
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}test"

  unittest:
    runs-on: ${{ inputs.runner }}

    if: ${{ inputs.rust-test }}

    needs: [lint, unittest-matrix]
    steps:
      - name: Print result
        run: echo ${{ needs.unittest-matrix.result }}
      - name: Interpret result
        run: |
          if [[ success == ${{ needs.unittest-matrix.result }} ]]
          then
            echo "All matrix jobs passed!"
          else
            echo "One or more matrix jobs failed."
            false
          fi

  wasm-test:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-test-wasm }}
    needs: [lint]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install pinned wasm-bindgen-cli
        # The wasm-bindgen-test runner must exactly match the wasm-bindgen crate
        # version pinned in Cargo.lock, otherwise it aborts with a schema-version
        # error. Derive the version from the lockfile so this stays in sync.
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock \
            | grep '^version' | head -n1 | cut -d'"' -f2)
          if [[ -z "${version}" ]]; then
            echo "::error::could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          echo "Locked wasm-bindgen version: ${version}"
          if wasm-bindgen --version 2>/dev/null | grep -qx "wasm-bindgen ${version}"; then
            echo "wasm-bindgen-cli ${version} already installed"
          else
            cargo install -f wasm-bindgen-cli --version "${version}"
          fi

      - name: Run wasm unit tests
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}test:wasm"

  # Headless-browser tests for the browser WebSocket transport. Isolated from
  # the Node-based `wasm-test` job (gloo-net's WebSocket needs real DOM APIs)
  # and toggleable via `rust-test-wasm-browser` so it can never destabilize the
  # stable wasm suite. Exercises the real gloo-net WebSocket against a local
  # binary-echo server in headless Chrome.
  wasm-browser-test:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    if: ${{ inputs.rust-test-wasm-browser }}
    needs: [lint]

    timeout-minutes: 30
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install pinned wasm-bindgen-cli
        # The wasm-bindgen-test runner must exactly match the wasm-bindgen crate
        # version pinned in Cargo.lock, otherwise it aborts with a schema-version
        # error. Derive the version from the lockfile so this stays in sync.
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock \
            | grep '^version' | head -n1 | cut -d'"' -f2)
          if [[ -z "${version}" ]]; then
            echo "::error::could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          echo "Locked wasm-bindgen version: ${version}"
          if wasm-bindgen --version 2>/dev/null | grep -qx "wasm-bindgen ${version}"; then
            echo "wasm-bindgen-cli ${version} already installed"
          else
            cargo install -f wasm-bindgen-cli --version "${version}"
          fi

      - name: Verify headless browser toolchain
        # ubuntu-latest ships Google Chrome + ChromeDriver preinstalled; fail
        # early with a clear message if that ever changes.
        run: |
          command -v chromedriver >/dev/null || { echo "::error::chromedriver not found on PATH"; exit 1; }
          chromedriver --version
          (google-chrome --version || google-chrome-stable --version) || true

      - name: Run wasm browser WebSocket tests
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
        run: |
          # Local binary-echo WebSocket server (loopback only) in an isolated
          # venv to avoid PEP 668 "externally-managed" pip failures.
          python3 -m venv /tmp/ws-echo-venv
          /tmp/ws-echo-venv/bin/pip install --quiet websockets
          /tmp/ws-echo-venv/bin/python .github/scripts/ws_echo_server.py 127.0.0.1 9001 &
          echo_pid=$!
          trap 'kill "${echo_pid}" 2>/dev/null || true' EXIT

          # Wait until the echo server accepts connections before compiling
          # (the tests read WS_ECHO_SERVER_URL via option_env! at compile time).
          for _ in $(seq 1 40); do
            if (exec 3<>/dev/tcp/127.0.0.1/9001) 2>/dev/null; then
              exec 3>&- 3<&-
              break
            fi
            sleep 0.25
          done

          export WS_ECHO_SERVER_URL="ws://127.0.0.1:9001"
          export CHROMEDRIVER="$(command -v chromedriver)"
          task "${TASK_PREFIX:+${TASK_PREFIX}:}test:wasm:browser"

  cross-build:
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    needs: [lint]

    if: ${{ inputs.rust-cross-build }}

    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [linux]
        profile: [release, debug]
        arch: [aarch64, x86_64]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.working-directory }}
          cache-enabled: ${{ matrix.profile != 'release' }}

      - name: Build
        env:
          TASK_PREFIX: ${{ inputs.task-prefix }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
          PROFILE: ${{ matrix.profile }}
        run: |
          task "${TASK_PREFIX:+${TASK_PREFIX}:}build" TARGET="${ARCH}-unknown-${OS}-gnu" PROFILE="${PROFILE}"
