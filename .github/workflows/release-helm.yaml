---
name: ci-release-helm

on:
  push:
    tags:
      - 'helm-*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare-build:
    name: Prepare Build
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      lint_with_subcharts: ${{ steps.resolve.outputs.lint_with_subcharts }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        run: |
          tag="${GITHUB_REF#refs/*/}"
          chart_tag="${tag#helm-}"
          echo "release_tag=${chart_tag}" >> "$GITHUB_OUTPUT"
          chart_name="${chart_tag%-v*}"
          # slim-spire vendors spire-lib into each subchart; linting subcharts
          # independently fails because the library is only available via the parent.
          if [[ "$chart_name" == "slim-spire" ]]; then
            echo "lint_with_subcharts=false" >> "$GITHUB_OUTPUT"
          else
            echo "lint_with_subcharts=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release Helm charts
    needs: [ prepare-build ]
    if: ${{ needs.prepare-build.outputs.release_tag != '' }}
    uses: ./.github/workflows/reusable-helm-release.yaml
    permissions:
      contents: 'read'
      packages: 'write'
      attestations: 'write'
    with:
      registry: ghcr.io/agntcy/slim
      release_tag: ${{ needs.prepare-build.outputs.release_tag }}
      lint-with-subcharts: ${{ needs.prepare-build.outputs.lint_with_subcharts == 'true' }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  test-integration:
    name: Run integration tests
    permissions:
      contents: read
    needs: [ release ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Trigger CSIT integration CI
        uses: ./.github/actions/trigger-integrations
        with:
          github-token: ${{ secrets.AGNTCY_BUILD_BOT_GH_TOKEN }}