---
name: dotnet-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: GitHub hosted runner or self-hosted runner
        required: false
        type: string
        default: ubuntu-latest
      continue-on-error:
        description: Whether to skip the status update for this job
        required: false
        type: boolean
        default: false
      rust-workspace:
        description: Rust workspace directory for caching
        required: false
        type: string
        default: ./data-plane
      dotnet-bindings-dir:
        description: Directory containing .NET bindings and tests
        required: false
        type: string
        default: ./data-plane/bindings/dotnet
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: "8.0.x"
      rust-target:
        description: Rust target triple for building libraries
        required: false
        type: string
        default: x86_64-unknown-linux-musl

env:
  LIBRARY_NAME: slim_bindings

jobs:
  build-rust-library:
    name: Build Rust library
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ./data-plane/bindings/rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}

      - name: Build library
        run: |
          task bindings:build:all TARGET=${{ inputs.rust-target }} PROFILE=release

      - name: Strip and rename artifacts
        run: |
          ls -lah ../../target/${{ inputs.rust-target }}/release/

          # Split target and use in filename
          TARGET="${{ inputs.rust-target }}"
          ARCH=$(echo "$TARGET" | cut -d'-' -f1)
          OS=$(echo "$TARGET" | cut -d'-' -f3)
          ABI=$(echo "$TARGET" | cut -d'-' -f4)

          echo "Architecture: $ARCH"
          echo "OS: $OS"
          echo "ABI: $ABI"

          # Build the library name with arch_os_abi if ABI is present, otherwise arch_os
          if [ -n "$ABI" ] && [ "$ABI" != "" ]; then
            LIB_NAME="slim_bindings_${ARCH}_${OS}_${ABI}"
          else
            LIB_NAME="slim_bindings_${ARCH}_${OS}"
          fi

          # Handle both libslim_bindings* (Unix) and slim_bindings* (Windows)
          for file in ../../target/${{ inputs.rust-target }}/release/libslim_bindings* ../../target/${{ inputs.rust-target }}/release/slim_bindings.*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")

              # Replace slim_bindings with arch_os_abi version, keeping any existing prefix
              new_filename="${filename/slim_bindings/${LIB_NAME}}"

              if [ "$filename" != "$new_filename" ]; then
                mv "$file" "../../target/${{ inputs.rust-target }}/release/${new_filename}"
              fi
            fi
          done

          echo "Renamed files:"
          ls -lah ../../target/${{ inputs.rust-target }}/release/*slim_bindings*

      - name: Upload libs
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ inputs.rust-target }}
          path: ./data-plane/target/${{ inputs.rust-target }}/release/*slim_bindings*

  build-dotnet-package:
    name: Build .NET package
    runs-on: ${{ inputs.runner }}
    needs: build-rust-library
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.dotnet-bindings-dir }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Setup Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Download library artifacts
      - name: Download library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: ./artifacts/

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find ./artifacts -type f -ls

      # Build a local shared library for binding generation
      # uniffi-bindgen-cs needs to load a .so dynamically to extract metadata
      - name: Build local shared library for binding generation
        working-directory: ./data-plane/bindings/rust
        run: |
          echo "Building local shared library for uniffi-bindgen-cs..."
          cargo build --release --lib
          ls -lah ../../target/release/libslim_bindings.*

      - name: Generate bindings and build
        run: |
          # Generate C# bindings
          task generate
          # Build the solution
          task build

      - name: Run smoke tests
        run: task test

      - name: Create NuGet package
        run: task pack

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-bindings-nuget
          path: ${{ inputs.dotnet-bindings-dir }}/nupkg/*.nupkg
          if-no-files-found: error

  test-dotnet-bindings-matrix:
    name: Test .NET Package (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    needs: build-dotnet-package
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux x86_64 variants
          - runner: ubuntu-24.04
            os: linux
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            os: linux
            target: x86_64-unknown-linux-musl
          # Windows variant
          - runner: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc
          # macOS variants
          - runner: macos-15-intel
            os: macos
            target: x86_64-apple-darwin
          - runner: macos-15
            os: macos
            target: aarch64-apple-darwin
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: dotnet-bindings-nuget
          path: ./nupkg/

      - name: List downloaded package
        run: |
          echo "Downloaded NuGet package:"
          ls -lah ./nupkg/

      - name: Test package installation and usage
        run: |
          echo "Testing .NET package on ${{ matrix.platform.target }}"
          echo "Platform: ${{ matrix.platform.os }}"
          echo "Runner: ${{ matrix.platform.runner }}"

          # Create a temporary test directory
          if [ "$RUNNER_OS" = "Windows" ]; then
            TEST_DIR=$(mktemp -d -p "$RUNNER_TEMP")
          else
            TEST_DIR=$(mktemp -d)
          fi
          cd "$TEST_DIR"
          echo "Testing in: $TEST_DIR"

          # Create a test console application
          dotnet new console -n SlimBindingsTest
          cd SlimBindingsTest

          # Add local NuGet source
          NUPKG_PATH=$(cd $GITHUB_WORKSPACE/nupkg && pwd)
          dotnet nuget add source "$NUPKG_PATH" --name "LocalPackages"

          # Find the package version
          PACKAGE=$(ls "$NUPKG_PATH"/*.nupkg | head -1)
          PACKAGE_NAME=$(basename "$PACKAGE" | sed 's/\.[0-9].*//')
          VERSION=$(basename "$PACKAGE" | sed -n 's/.*\.\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*.*\)\.nupkg/\1/p')
          
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

          # Install the package
          dotnet add package "$PACKAGE_NAME" --version "$VERSION" --source "LocalPackages"
          echo "Package installed successfully"

          # Copy and run test program
          cp $GITHUB_WORKSPACE/.github/tests/dotnet/test_installation.cs ./Program.cs
          
          # Build and run
          dotnet build
          dotnet run
          
          echo ""
          echo "All tests passed on ${{ matrix.platform.target }}!"

      - name: Test result summary
        if: success()
        run: |
          echo ".NET package verification completed successfully on ${{ matrix.platform.target }}"
          echo "The package can be safely published."

  test-dotnet-bindings:
    name: Test .NET Bindings Summary
    runs-on: ubuntu-latest
    needs: test-dotnet-bindings-matrix
    steps:
      - name: Print result
        run: echo ${{ needs.test-dotnet-bindings-matrix.result }}
      - name: Interpret result
        run: |
          if [[ success == ${{ needs.test-dotnet-bindings-matrix.result }} ]]
          then
            echo "All matrix jobs passed!"
          else
            echo "One or more matrix jobs failed."
            false
          fi
