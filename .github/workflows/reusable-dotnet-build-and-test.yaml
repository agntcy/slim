---
name: reusable-dotnet-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: GitHub hosted runner or self-hosted runner
        required: false
        type: string
        default: ubuntu-latest
      continue-on-error:
        description: Whether to skip the status update for this job
        required: false
        type: boolean
        default: false
      rust-workspace:
        description: Rust workspace directory for caching
        required: false
        type: string
        default: ./data-plane
      dotnet-bindings-dir:
        description: Directory containing .NET bindings and tests
        required: false
        type: string
        default: ./data-plane/bindings/dotnet
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: '8.0.x'
      rust-target:
        description: Rust target triple for building libraries
        required: false
        type: string
        default: x86_64-unknown-linux-musl
      tag-name:
        description: Git tag name for version extraction (e.g., slim-bindings-1.2.3)
        required: false
        type: string
        default: ''

env:
  LIBRARY_NAME: slim_bindings

jobs:
  build-dotnet-package:
    name: Build .NET package
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.dotnet-bindings-dir }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}
          cache-enabled: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      # Download all library artifacts from the build-libraries job
      - name: Download library artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bindings-*
          path: ${{ github.workspace }}/target-artifacts/

      - name: Restore libraries to target folder
        run: |
          echo "📦 Restoring artifacts to target folder..."
          for artifact_dir in "$GITHUB_WORKSPACE/target-artifacts/bindings-"*; do
            [ -d "$artifact_dir" ] || continue
            target=$(basename "$artifact_dir" | sed 's/^bindings-//')
            mkdir -p "$GITHUB_WORKSPACE/data-plane/target/$target/release/"
            find "$artifact_dir" -maxdepth 1 -type f -exec cp {} "$GITHUB_WORKSPACE/data-plane/target/$target/release/" \;
            echo "  Restored $target"
          done
          echo "📁 Restored libraries:"
          find "$GITHUB_WORKSPACE/data-plane/target" -name "*slim_bindings*" -type f | sort
          rm -rf "$GITHUB_WORKSPACE/target-artifacts"

      - name: Generate C# bindings
        run: |
          task generate PROFILE=release

      - name: Strip shared libraries
        run: |
          echo "✂️  Stripping shared libraries using llvm-strip-19..."
          find ./runtimes -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) | while read -r lib; do
            echo "  Stripping: $lib"
            llvm-strip-19 "$lib"
          done

      - name: Build, test and pack
        run: |
          TAG_NAME_PARAM=""
          if [[ -n "${{ inputs.tag-name }}" ]]; then
            TAG_NAME_PARAM="TAG_NAME=${{ inputs.tag-name }}"
          fi

          task slimrpc:generate-proto
          task lint
          task build PROFILE=release
          task test
          task pack OUTPUT_DIR=./nupkg $TAG_NAME_PARAM

      - name: Upload NuGet packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dotnet-bindings-nuget
          path: ${{ inputs.dotnet-bindings-dir }}/nupkg
          if-no-files-found: error
