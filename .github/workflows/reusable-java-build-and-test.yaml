---
name: reusable-java-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      rust-workspace:
        description: Rust workspace directory
        required: false
        type: string
        default: ./data-plane
      java-version:
        description: Java version to use
        required: false
        type: string
        default: '21'
      working-directory:
        description: The working directory to run the task
        required: false
        type: string
        default: ./data-plane/bindings/java

jobs:
  java-bindings-build-and-test:
    name: Java Bindings Build and Test
    runs-on: ${{ inputs.runner }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ inputs.java-version }}

      # Download all library artifacts from build-libraries job
      - name: Download library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: ${{ inputs.working-directory }}/artifacts/

      - name: List downloaded artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find ./artifacts -type f -name "*.so" -o -name "*.dll" -o -name "*.dylib" -o -name "*.a" | sort

      # Generate bindings and run tests
      - name: Generate bindings and run tests
        run: |
          echo "Generate bindings and run tests..."
          # First, copy-libraries will run (inside generate task) and create generated/native structure (JNA format: linux-x86-64)
          # LIB_PATH points to the library for uniffi-bindgen and is passed to mvn test for uniffi.component.slim_bindings.libraryOverride
          LIB_FILE="generated/native/linux-x86-64/libslim_bindings.so"
          echo "Using library: $LIB_FILE"
          task test SKIP_BUILD=true ARTIFACTS_DIR=./artifacts LIB_PATH="$LIB_FILE"

      - name: Install LLVM
        run: |
          curl -L https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19

      - name: Strip shared libraries
        run: |
          echo "✂️  Stripping shared libraries using llvm-strip-19..."
          find ./generated/native -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) 2>/dev/null | while read -r lib; do
            echo "  Stripping: $lib"
            llvm-strip-19 "$lib"
          done

      - name: Upload generated Java code and native libraries
        uses: actions/upload-artifact@v4
        with:
          name: java-bindings-generated-code
          path: |
            ${{ inputs.working-directory }}/generated/uniffi/**/*.java
            ${{ inputs.working-directory }}/generated/native/**/*
          if-no-files-found: error
