---
name: reusable-java-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      rust-workspace:
        description: Rust workspace directory
        required: false
        type: string
        default: ./data-plane
      java-version:
        description: Java version to use
        required: false
        type: string
        default: '21'
      working-directory:
        description: The working directory to run the task
        required: false
        type: string
        default: ./data-plane/bindings/java

jobs:
  java-bindings-build-and-test:
    name: Java Bindings Build and Test
    runs-on: ${{ inputs.runner }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ${{ inputs.rust-workspace }}
          cache-enabled: false

      - name: Setup Java
        uses: ./.github/actions/setup-java
        with:
          java-version: ${{ inputs.java-version }}

      # Download all library artifacts and restore to target folder structure
      - name: Download library artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ github.workspace }}/target-artifacts/

      - name: Restore libraries to target folder
        run: |
          echo "📦 Restoring artifacts to target folder..."
          for artifact_dir in "$GITHUB_WORKSPACE/target-artifacts/bindings-"*; do
            [ -d "$artifact_dir" ] || continue
            target=$(basename "$artifact_dir" | sed 's/^bindings-//')
            mkdir -p "$GITHUB_WORKSPACE/data-plane/target/$target/release/"
            find "$artifact_dir" -maxdepth 1 -type f -exec cp {} "$GITHUB_WORKSPACE/data-plane/target/$target/release/" \;
            echo "  Restored $target"
          done
          echo "📁 Restored libraries:"
          find "$GITHUB_WORKSPACE/data-plane/target" -name "*slim_bindings*" -type f | sort
          rm -rf "$GITHUB_WORKSPACE/target-artifacts"

      # Generate bindings and run tests
      - name: Generate bindings and run tests
        run: |
          echo "Generate bindings and run tests..."
          task test PROFILE=release

      - name: Install LLVM
        run: |
          curl -L https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19

      - name: Strip shared libraries
        run: |
          echo "✂️  Stripping shared libraries using llvm-strip-19..."
          find ./generated/native -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) 2>/dev/null | while read -r lib; do
            echo "  Stripping: $lib"
            llvm-strip-19 "$lib"
          done

      - name: Upload generated Java code and native libraries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: java-bindings-generated-code
          path: |
            ${{ inputs.working-directory }}/generated/uniffi/**/*.java
            ${{ inputs.working-directory }}/generated/native/**/*
          if-no-files-found: error
