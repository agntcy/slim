---
name: ci-publish-project-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/docs-ci.yaml'
      - '.github/workflows/docs-deploy.yml'
      - '.github/workflows/reusable-docs.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: data-plane
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspace: ./data-plane

      - name: Install just
        run: |
          sudo snap install just --classic || true

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate data plane coverage report
        run: task data-plane:test:coverage ARGS="--workspace --all-targets --locked --all-features"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: data-plane/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
