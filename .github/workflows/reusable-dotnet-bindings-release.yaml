---
name: reusable-dotnet-bindings-release

on:
  workflow_call:
    inputs:
      library-name:
        description: Name of the library
        required: false
        type: string
        default: slim_bindings
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: "8.0.x"
      dotnet-bindings-working-directory:
        description: Working directory for .NET bindings
        required: false
        type: string
        default: ./data-plane/bindings/dotnet
      nuget-package-name:
        description: NuGet package name
        required: false
        type: string
        default: Agntcy.Slim
    secrets:
      nuget-api-token:
        description: NuGet API token for publishing
        required: true

env:
  LIBRARY_NAME: ${{ inputs.library-name }}
  NUGET_PACKAGE_NAME: ${{ inputs.nuget-package-name }}

jobs:
  release-dotnet-bindings:
    name: Release .NET Bindings
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.dotnet-bindings-working-directory }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      # Download NuGet package artifact
      - name: Download NuGet Package Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dotnet-bindings-nuget
          path: ${{ inputs.dotnet-bindings-working-directory }}/nupkg

      - name: List downloaded artifacts
        run: |
          echo "Downloaded NuGet package:"
          ls -lah ./nupkg/

      - name: Extract version from package name
        id: extract-version
        run: |
          # Use Agntcy.Slim (not Agntcy.Slim.SlimRpc) for version metadata
          PACKAGE=""
          for f in ./nupkg/Agntcy.Slim.*.nupkg; do
            [[ "$f" != *SlimRpc* ]] && PACKAGE="$f" && break
          done
          FILENAME=$(basename "$PACKAGE")
          # Extract version from Agntcy.Slim.X.Y.Z.nupkg
          VERSION=$(echo "$FILENAME" | sed -n 's/Agntcy\.Slim\.\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*.*\)\.nupkg/\1/p')
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine if pre-release
        id: prerelease
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "This is a pre-release version"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "This is a stable release"
          fi

      - name: Publish to NuGet.org
        run: |
          set -euo pipefail
          shopt -s nullglob

          for PACKAGE in ./nupkg/*.nupkg; do
            echo "Publishing package: $PACKAGE"
            dotnet nuget push "$PACKAGE" \
              --api-key "${{ secrets.nuget-api-token }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

          for PACKAGE in ./nupkg/*.snupkg; do
            echo "Publishing symbol package: $PACKAGE"
            dotnet nuget push "$PACKAGE" \
              --api-key "${{ secrets.nuget-api-token }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

          echo "Successfully published all packages to NuGet.org"
