---

name: python-build-and-test
on:
  workflow_call:
    inputs:
      runner:
        description: Github hosted runner or Self hosted runner
        required: false
        type: string
        default: ubuntu-latest
      working-directory:
        description: Working directory
        required: false
        type: string
        default: ""
      prefix:
        description: Taskfile task prefix
        required: false
        type: string
        default: ""
      package:
        description: Package name
        required: false
        type: string
        default: "dist"
      continue-on-error:
        description: Whether to skip the status update for this job
        required: false
        type: boolean
        default: false
      py-lint:
        description: Whether to run "task lint"
        required: false
        type: boolean
        default: true
      py-vuln:
        description: Whether to run "task vuln"
        required: false
        type: boolean
        default: true
      py-test:
        description: Whether to run "task coverage"
        required: false
        type: boolean
        default: true
      py-package:
        description: Whether to run "task package"
        required: false
        type: boolean
        default: true

jobs:
  pylint:
    runs-on: ubuntu-latest
    if: ${{ inputs.py-lint }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup UV
        id: setup-uv
        uses: ./.github/actions/setup-python
        with:
          uv-install: true
      - name: lint
        run: |
          task ${{ inputs.prefix }}:lint

  pytest:
    runs-on: ubuntu-latest
    if: ${{ inputs.py-test }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup UV
        id: setup-uv
        uses: ./.github/actions/setup-python
        with:
          uv-install: true
      - name: Run test
        run: |
          task ${{ inputs.prefix }}:test

  pypackage:
    runs-on: ubuntu-latest
    if: ${{ inputs.py-package }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup UV
        id: setup-uv
        uses: ./.github/actions/setup-python
        with:
          uv-install: true
      - name: Build package
        run: |
          task ${{ inputs.prefix }}:packaging
      - name: Show packages
        run: |
          ls -la ./dist
      - name: Verify install from built artifacts
        run: |
          python -m venv /tmp/package-install
          source /tmp/package-install/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir ./dist/*.whl
          python -m pip check
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.package }}
          if-no-files-found: error
          path: ${{ inputs.working-directory }}/dist
