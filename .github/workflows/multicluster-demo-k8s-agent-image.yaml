---
name: ci-multicluster-demo-k8s-agent-image

on:
  push:
    tags:
      - 'k8s-troubleshooting-agent-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare-build:
    name: Prepare Build
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve version from tag
        id: resolve
        run: |
          # Tag format: k8s-agent-v{version}
          VERSION="${GITHUB_REF_NAME#k8s-agent-v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Docker image version: ${VERSION}"

  build-docker:
    name: Build and Push Docker
    needs: [prepare-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Disk cleanup
        uses: ./.github/actions/cleanup-disk

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check available disk space
        run: df -h

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./multicluster-demo/k8s_troubleshooting_agent
          file: ./multicluster-demo/k8s_troubleshooting_agent/Dockerfile
          push: true
          tags: |
            ghcr.io/agntcy/slim/multicluster-demo/k8s-agent:${{ needs.prepare-build.outputs.version }}
            ghcr.io/agntcy/slim/multicluster-demo/k8s-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
