---
name: ci-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-cross-build:
    name: Nightly release build
    uses: ./.github/workflows/reusable-rust-build-and-test.yaml
    with:
      rust-lint: true
      rust-vuln: false
      rust-test: false
      rust-cross-build: true
      rust-cross-build-profiles: '["release"]'
      rust-cross-build-arches: '["aarch64","x86_64"]'

  benchmark:
    name: Data plane benchmark
    uses: ./.github/workflows/benchmark.yaml

  # wasm suites run nightly (off the PR path): the browser suite is flaky
  # (headless Chrome) and neither was on the PR critical path.
  wasm-test:
    name: wasm unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install pinned wasm-bindgen-cli
        # The wasm-bindgen-test runner must exactly match the wasm-bindgen crate
        # version pinned in Cargo.lock, otherwise it aborts with a schema-version
        # error. Derive the version from the lockfile so this stays in sync.
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock \
            | grep '^version' | head -n1 | cut -d'"' -f2)
          if [[ -z "${version}" ]]; then
            echo "::error::could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          echo "Locked wasm-bindgen version: ${version}"
          if wasm-bindgen --version 2>/dev/null | grep -qx "wasm-bindgen ${version}"; then
            echo "wasm-bindgen-cli ${version} already installed"
          else
            cargo install -f wasm-bindgen-cli --version "${version}"
          fi

      - name: Run wasm unit tests
        run: task test:wasm

  # Headless-browser tests for the browser WebSocket transport. Isolated from
  # the Node-based `wasm-test` job (gloo-net's WebSocket needs real DOM APIs).
  # Exercises the real gloo-net WebSocket against a local binary-echo server in
  # headless Chrome.
  wasm-browser-test:
    name: wasm browser tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install pinned wasm-bindgen-cli
        # The wasm-bindgen-test runner must exactly match the wasm-bindgen crate
        # version pinned in Cargo.lock, otherwise it aborts with a schema-version
        # error. Derive the version from the lockfile so this stays in sync.
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock \
            | grep '^version' | head -n1 | cut -d'"' -f2)
          if [[ -z "${version}" ]]; then
            echo "::error::could not determine wasm-bindgen version from Cargo.lock"
            exit 1
          fi
          echo "Locked wasm-bindgen version: ${version}"
          if wasm-bindgen --version 2>/dev/null | grep -qx "wasm-bindgen ${version}"; then
            echo "wasm-bindgen-cli ${version} already installed"
          else
            cargo install -f wasm-bindgen-cli --version "${version}"
          fi

      - name: Verify headless browser toolchain
        # ubuntu-latest ships Google Chrome + ChromeDriver preinstalled; fail
        # early with a clear message if that ever changes.
        run: |
          command -v chromedriver >/dev/null || { echo "::error::chromedriver not found on PATH"; exit 1; }
          chromedriver --version
          (google-chrome --version || google-chrome-stable --version) || true

      - name: Run wasm browser WebSocket tests
        run: |
          # Local binary-echo WebSocket server (loopback only) in an isolated
          # venv to avoid PEP 668 "externally-managed" pip failures.
          python3 -m venv /tmp/ws-echo-venv
          /tmp/ws-echo-venv/bin/pip install --quiet websockets
          /tmp/ws-echo-venv/bin/python .github/scripts/ws_echo_server.py 127.0.0.1 9001 &
          echo_pid=$!
          trap 'kill "${echo_pid}" 2>/dev/null || true' EXIT

          # Wait until the echo server accepts connections before compiling
          # (the tests read WS_ECHO_SERVER_URL via option_env! at compile time).
          for _ in $(seq 1 40); do
            if (exec 3<>/dev/tcp/127.0.0.1/9001) 2>/dev/null; then
              exec 3>&- 3<&-
              break
            fi
            sleep 0.25
          done

          export WS_ECHO_SERVER_URL="ws://127.0.0.1:9001"
          CHROMEDRIVER="$(command -v chromedriver)"
          export CHROMEDRIVER
          task test:wasm:browser

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: tests/go.mod

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run integration test suite
        working-directory: ./tests
        run: task tests:integration

  sessions-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run group communication integration test
        working-directory: ./crates/testing
        run: task test:group-session

      - name: Run point to point integration test
        working-directory: ./crates/testing
        run: task test:point-to-point-session
