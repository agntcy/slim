---
name: ci-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-cross-build:
    name: Nightly release build
    uses: ./.github/workflows/reusable-rust-build-and-test.yaml
    with:
      rust-lint: true
      rust-vuln: false
      rust-test: false
      rust-test-wasm: false
      rust-test-wasm-browser: false
      rust-cross-build: true
      rust-cross-build-profiles: '["release"]'
      rust-cross-build-arches: '["aarch64","x86_64"]'

  benchmark:
    name: Data plane benchmark
    uses: ./.github/workflows/benchmark.yaml

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: tests/go.mod

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run integration test suite
        working-directory: ./tests
        run: task tests:integration

  sessions-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run group communication integration test
        working-directory: ./crates/testing
        run: task test:group-session

      - name: Run point to point integration test
        working-directory: ./crates/testing
        run: task test:point-to-point-session
