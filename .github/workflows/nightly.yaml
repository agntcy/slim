---
name: ci-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-wasm:
    name: Nightly release build + wasm
    uses: ./.github/workflows/reusable-rust-build-and-test.yaml
    with:
      rust-lint: true
      rust-vuln: false
      rust-test: false
      # wasm suites moved off the PR path; the wasm jobs need the lint job,
      # so they share this call's single lint run.
      rust-test-wasm: true
      rust-test-wasm-browser: true
      rust-cross-build: true
      rust-cross-build-profiles: '["release"]'
      rust-cross-build-arches: '["aarch64","x86_64"]'

  benchmark:
    name: Data plane benchmark
    uses: ./.github/workflows/benchmark.yaml

  integration-tests:
    name: Active integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run active integration tests
        working-directory: ./tests
        run: task tests:integration

  integration-tests-legacy:
    name: Legacy backward-compat tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Required to git worktree checkout v2-main for legacy binary builds.
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run legacy integration tests
        working-directory: ./tests
        run: task tests:integration-legacy

  sessions-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run group communication integration test
        working-directory: ./crates/testing
        run: task test:group-session

      - name: Run point to point integration test
        working-directory: ./crates/testing
        run: task test:point-to-point-session
