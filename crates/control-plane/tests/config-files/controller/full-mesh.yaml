# Full mesh topology: all domains link to each other.
# Expressed as a wildcard link entry in config-managed mode.

tracing:
  log_level: debug

northbound:
  endpoint: "127.0.0.1:50051"
  tls:
    insecure: true

southbound:
  endpoint: "127.0.0.1:50052"
  tls:
    insecure: true

#database:
#  type: in_memory

database:
  type: sqlite
  path: /tmp/slim-test.db

topology:
  links:
    - domain: "*"
      neighbors: ["*"]
