# Star topology: hub domain links to all spokes, spokes link only to hub.
# SPT handles transit routing automatically — spokes reach each other
# through the hub without needing explicit routing_policy.

tracing:
  log_level: debug

northbound:
  endpoint: "127.0.0.1:50051"
  tls:
    insecure: true

southbound:
  endpoint: "127.0.0.1:50052"
  tls:
    insecure: true

database:
  type: in_memory

# database:
#   type: sqlite
#   path: /tmp/slim-test.db

topology:
  registration_auth:
    type: shared_secret
    secrets:
      domain-1: "secret-for-domain-1-abcdefghi-1234567890"
      domain-2: "secret-for-domain-2-abcdefghi-1234567890"
      domain-3: "secret-for-domain-3-abcdefghi-1234567890"
      deployment-a: "secret-for-deployment-a-abcdefghi-1234567890"
      deployment-b: "secret-for-deployment-b-abcdefghi-1234567890"
      deployment-c: "secret-for-deployment-c-abcdefghi-1234567890"
      deployment-d: "secret-for-deployment-d-abcdefghi-1234567890"
      deployment-none: "secret-for-deployment-none-abcdefghi-1234567890"
      deployment-jwt: "secret-for-deployment-jwt-abcdefghi-1234567890"
      deployment-tls: "secret-for-deployment-tls-abcdefghi-1234567890"
      deployment-spire: "secret-for-deployment-spire-abcdefghi-1234567890"
  # registration_auth:
  #   type: spire
  #   socket_path: "/run/spire/agent-sockets/api.sock"

  segments:
    - name: segment-$domain
      links:
        - domain: domain-1
          neighbors: [$domain]
