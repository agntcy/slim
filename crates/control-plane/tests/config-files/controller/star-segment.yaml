# Star topology: hub group links to all spokes, spokes link only to hub.
# SPT handles transit routing automatically — spokes reach each other
# through the hub without needing explicit routing_policy.

tracing:
  log_level: debug

northbound:
  endpoint: "127.0.0.1:50051"
  tls:
    insecure: true

southbound:
  endpoint: "127.0.0.1:50052"
  tls:
    insecure: true

database:
  type: in_memory

# database:
#   type: sqlite
#   path: /tmp/slim-test.db

registration_auth:
  type: shared_secret
  secrets:
    group-1: "secret-for-group-1-abcdefghi-1234567890"
    group-2: "secret-for-group-2-abcdefghi-1234567890"
    group-3: "secret-for-group-3-abcdefghi-1234567890"
    deployment-a: "secret-for-deployment-a-abcdefghi-1234567890"

# registration_auth:
#   type: spire
#   socket_path: "/run/spire/agent-sockets/api.sock"

topology:
  segments:
    - name: segment-$group
      links:
        - group: group-1
          neighbors: [$group]
