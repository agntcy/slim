# Arbitrary topology.
# Links:  node-a — node-b, node-a — node-c, node-c — node-d.

tracing:
  log_level: debug

northbound:
  endpoint: "127.0.0.1:50051"
  tls:
    insecure: true

southbound:
  endpoint: "127.0.0.1:50052"
  tls:
    insecure: true

database:
  type: in_memory

topology:
  links:
    - domain: domain-1
      neighbors: [domain-2, domain-3]
    - domain: domain-3
      neighbors: [domain-4]
