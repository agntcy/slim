# API-managed topology mode: no topology section means the DB owns
# topology state and CRUD operations are available via gRPC/CLI.

tracing:
  log_level: debug

northbound:
  endpoint: "127.0.0.1:50051"
  tls:
    insecure: true

southbound:
  endpoint: "127.0.0.1:50052"
  tls:
    insecure: true

database:
  type: in_memory

#database:
#  type: sqlite
#  path: /tmp/slim-test.db

# Empty topology = API-managed mode.
topology: {}
