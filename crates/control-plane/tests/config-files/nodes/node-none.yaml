# SLIM node with no auth (insecure).
# Registers with tls_required=false, auth_method=none.
# Equivalent to the default setup used by node-a through node-d.
tracing:
  log_level: debug

services:
  slim/node-none:
    group_name: deployment-none
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46203"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46203"
    controller:
      servers:
        - endpoint: "127.0.0.1:47203"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
