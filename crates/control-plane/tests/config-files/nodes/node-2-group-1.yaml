# SLIM node-2 (group-1)
tracing:
  log_level: debug

services:
  slim/node-2:
    group_name: group-1
    node_id: node-2
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46102"
          metadata:
            external_endpoint: "127.0.0.1:46102"
          tls:
            insecure: true
    controller:
      servers:
        - endpoint: "127.0.0.1:47102"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
    peers:
      deployment_name: "group-1"
      topology: "full_mesh"
      discovery:
        type: static
        peers:
          - node_id: "node-1"
            endpoint: "http://127.0.0.1:46101"
            tls:
              insecure: true
          - node_id: "node-2"
            endpoint: "http://127.0.0.1:46102"
            tls:
              insecure: true
