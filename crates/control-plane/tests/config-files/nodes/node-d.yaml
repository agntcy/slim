# SLIM node-d
tracing:
  log_level: debug

services:
  slim/node-d:
    node_id: node-d
    group_name: deployment-d
    auth:
      type: shared_secret
      secret: "secret-for-deployment-d-abcdefghi-1234567890"
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46103"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46103"
    controller:
      servers:
        - endpoint: "127.0.0.1:47103"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
