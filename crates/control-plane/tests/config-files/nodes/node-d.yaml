# SLIM node-d
tracing:
  log_level: debug

services:
  slim/node-d:
    group_name: deployment-d
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46103"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46103"
    controller:
      servers:
        - endpoint: "127.0.0.1:47103"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
