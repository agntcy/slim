# SLIM node with JWT on the dataplane server (advertised to CP as auth_method=jwt).
tracing:
  log_level: debug

services:
  slim/node-jwt:
    node_id: node-jwt
    group_name: deployment-jwt
    auth:
      type: shared_secret
      secret: "secret-for-deployment-jwt-abcdefghi-1234567890"
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46202"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46202"
          auth:
            type: jwt
            claims:
              audiences: ["slim"]
              issuer: slim-jwt-example
            duration: 1h
            key:
              type: decoding
              algorithm: HS256
              format: pem
              key:
                data: "jwt-example-secret-long-enough-ok"
    controller:
      servers:
        - endpoint: "127.0.0.1:47202"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
      # outbound_clients: local credential table for control plane-driven inter-node links.
      # Not sent to the CP. When this node is the link source, the reconciler
      # dials the destination URL from the control plane link config and looks up auth here
      # by exact endpoint match (scheme + host + port). Add one entry per
      # protected peer you may connect to; omit for auth_method=none destinations.
      # Configure on the connector node, keyed to the peer's link endpoint.
      outbound_clients:
        - endpoint: "http://127.0.0.1:46202"
          tls:
            insecure: true
          auth:
            type: jwt
            claims:
              audiences: ["slim"]
              issuer: slim-jwt-example
            duration: 1h
            key:
              type: encoding
              algorithm: HS256
              format: pem
              key:
                data: "jwt-example-secret-long-enough-ok"
