# SLIM node with basic auth on the dataplane server (auth_method=basic).
# tls_required=false here (insecure TLS). Set insecure: false and add cert paths for mTLS.
tracing:
  log_level: debug

services:
  slim/node-tls:
    node_id: node-tls
    domain_name: deployment-tls
    auth:
      type: shared_secret
      secret: "secret-for-deployment-tls-abcdefghi-1234567890"
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46200"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46200"
          auth:
            type: basic
            username: "slim-node"
            password: "password"
    controller:
      servers:
        - endpoint: "127.0.0.1:47200"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
      # outbound_clients: local credential table for control plane-driven inter-node links.
      # Not sent to the CP. When this node is the link source, the reconciler
      # dials the destination URL from the control plane link config and looks up auth here
      # by exact endpoint match (scheme + host + port). Add one entry per
      # protected peer you may connect to; omit for auth_method=none destinations.
      # Configure on the connector node, keyed to the peer's link endpoint.
      outbound_clients:
        - endpoint: "http://127.0.0.1:46200"
          tls:
            insecure: true
          auth:
            type: basic
            username: "slim-node"
            password: "password"
