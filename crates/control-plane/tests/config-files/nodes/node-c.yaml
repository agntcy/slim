# SLIM node-c
tracing:
  log_level: debug

services:
  slim/node-c:
    node_id: node-c
    domain_name: deployment-c
    auth:
      type: shared_secret
      secret: "secret-for-deployment-c-abcdefghi-1234567890"
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46102"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46102"
    controller:
      servers:
        - endpoint: "127.0.0.1:47102"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
