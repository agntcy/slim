# SLIM node-5 (group-3)
tracing:
  log_level: debug

services:
  slim/node-5:
    group_name: group-3
    node_id: node-5
    auth:
      type: shared_secret
      secret: "secret-for-group-3-abcdefghi-1234567890"

    dataplane:
      servers:
        - endpoint: "127.0.0.1:46105"
          metadata:
            external_endpoint: "127.0.0.1:46105"
          tls:
            insecure: true
    controller:
      servers:
        - endpoint: "127.0.0.1:47105"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
    peers:
      deployment_name: "group-3"
      topology: "full_mesh"
      discovery:
        type: static
        peers:
          - node_id: "node-5"
            endpoint: "http://127.0.0.1:46105"
            tls:
              insecure: true
          - node_id: "node-6"
            endpoint: "http://127.0.0.1:46106"
            tls:
              insecure: true
