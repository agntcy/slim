# SLIM node-4 (group-2)
tracing:
  log_level: debug

services:
  slim/node-4:
    group_name: group-2
    node_id: node-4
    auth:
      type: shared_secret
      secret: "secret-for-group-2-abcdefghi-1234567890"

    dataplane:
      servers:
        - endpoint: "127.0.0.1:46104"
          metadata:
            external_endpoint: "127.0.0.1:46104"
          tls:
            insecure: true
    controller:
      servers:
        - endpoint: "127.0.0.1:47104"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
    peers:
      deployment_name: "group-2"
      topology: "full_mesh"
      discovery:
        type: static
        peers:
          - node_id: "node-3"
            endpoint: "http://127.0.0.1:46103"
            tls:
              insecure: true
          - node_id: "node-4"
            endpoint: "http://127.0.0.1:46104"
            tls:
              insecure: true
