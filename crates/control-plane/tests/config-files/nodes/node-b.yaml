# SLIM node-b
tracing:
  log_level: debug

services:
  slim/node-b:
    node_id: node-b
    domain_name: deployment-b
    auth:
      type: shared_secret
      secret: "secret-for-deployment-b-abcdefghi-1234567890"
    dataplane:
      servers:
        - endpoint: "127.0.0.1:46101"
          tls:
            insecure: true
          metadata:
            external_endpoint: "127.0.0.1:46101"
    controller:
      servers:
        - endpoint: "127.0.0.1:47101"
          tls:
            insecure: true
      clients:
        - endpoint: "http://127.0.0.1:50052"
          tls:
            insecure: true
