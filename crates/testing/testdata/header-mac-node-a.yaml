#
# Node A for header-integrity + control-plane integration: dataplane listens for
# peer federation clients and exposes a controller for slimctl route programming.
# Ports 46357/46358 are rewritten at test runtime.

tracing:
  log_level: debug
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-header-mac-node-a"
  drain_timeout: 10s

services:
  slim/0:
    dataplane:
      servers:
        - endpoint: "0.0.0.0:46357"
          tls:
            insecure: true
      clients: []
    controller:
      servers:
        - endpoint: "0.0.0.0:46358"
          tls:
            insecure: true
